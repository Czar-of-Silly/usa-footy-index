// Grade engine
function pct(a,v){const s=[...a].sort((x,y)=>x-y);return s.filter(x=>x<v).length/Math.max(s.length,1);}
function toG(p){return Math.round(42+Math.max(0,Math.min(1,p))*57);}
function computeGrades(ps){
  if(!ps.length)return{};
  const v=(k)=>ps.map(p=>p[k]||0);
  const xg=v("xg90"),xa=v("xa90"),ga=v("tga"),df=v("dga"),pc=v("pc"),pg=v("pga");
  const kp=v("kp90"),sca=v("sca90"),ftp=v("ftp90");
  const prs=v("prs90"),intc=v("intc90"),arl=v("arl90");
  const drb=v("drb90"),prgc=v("prgc90");
  const o={};
  ps.forEach(p=>{
    // Attack: xG/90 35%, xA/90 15%, Key Passes/90 25%, Shots on target (via sca90 proxy) 25%
    const att=pct(xg,p.xg90)*.35+pct(xa,p.xa90)*.15+pct(kp,p.kp90)*.25+pct(sca,p.sca90)*.25;
    // Passing: completion 30%, pass G+ 15%, final third passes/90 30%, key passes/90 25%
    const pas=pct(pc,p.pc)*.30+pct(pg,p.pga)*.15+pct(ftp,p.ftp90)*.30+pct(kp,p.kp90)*.25;
    // Defense: def G+ 25%, ball recovery/90 25%, interceptions/90 25%, aerials/90 25%
    const def=pct(df,p.dga)*.25+pct(prs,p.prs90)*.25+pct(intc,p.intc90)*.25+pct(arl,p.arl90)*.25;
    // Creativity: key passes/90 35%, big chances created/90 35%, xA/90 30%
    const cre=pct(kp,p.kp90)*.35+pct(sca,p.sca90)*.35+pct(xa,p.xa90)*.30;
    // Carrying: dribbles/90 50%, final third passes/90 30%, progressive carries/90 20%
    const car=pct(drb,p.drb90)*.50+pct(ftp,p.ftp90)*.30+pct(prgc,p.prgc90)*.20;
    // Overall: total G+ 30%, attack 20%, passing 15%, defense 15%, creativity 10%, carrying 10%
    const ov=pct(ga,p.tga)*.3+att*.2+pas*.15+def*.15+cre*.1+car*.1;
    o[p.id]={overall:toG(ov),attack:toG(att),passing:toG(pas),defense:toG(def),creativity:toG(cre),carrying:toG(car)};
  });
  return o;
}

// Helpers — muted newspaper grade colors
const gc = g => g>=85?"#B68D40":g>=75?T.green:g>=65?T.blue:g>=55?T.textDim:T.red;
const gb = g => g>=85?"#B68D4015":g>=75?T.green+"12":g>=65?T.blue+"10":g>=55?"#6B656008":T.red+"0a";
const gl = g => g>=85?"ELITE":g>=75?"GREAT":g>=65?"ABOVE AVG":g>=55?"AVG":"POOR";
const vc = e => !e||e===0?T.textMute:e>=10e6?"#B68D40":e>=5e6?T.green:e>=2e6?T.blue:e>=5e5?T.textDim:T.textMute;
function fv(e){if(!e)return"—";if(e>=1e6)return`$${(e/1e6).toFixed(1)}M`;if(e>=1e3)return`$${(e/1e3).toFixed(0)}K`;return`$${e}`;}

const hm=(val,max,inv)=>{if(val==null||max===0)return"transparent";const n=Math.min(1,Math.max(0,(inv?1-val/max:val/max)));const a=n*.12;return T.ink?`rgba(0,0,0,${a})`:`rgba(255,255,255,${a})`;};

function RadarChart({grades,size=170}){
  const cats=[{k:"attack",l:"ATT"},{k:"creativity",l:"CRE"},{k:"passing",l:"PAS"},{k:"defense",l:"DEF"},{k:"carrying",l:"CAR"},{k:"overall",l:"OVR"}];
  const cx=size/2,cy=size/2,r=size*.36;
  const pt=(i,pct)=>{const ang=((Math.PI*2)/cats.length)*i-Math.PI/2;return[cx+r*pct*Math.cos(ang),cy+r*pct*Math.sin(ang)];};
  const rings=[.25,.5,.75,1];
  const vals=cats.map(c=>Math.min(1,(grades[c.k]||50)/99));
  const poly=vals.map((v,i)=>pt(i,v).join(",")).join(" ");
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    {rings.map(rv=><polygon key={rv} points={cats.map((_,i)=>pt(i,rv).join(",")).join(" ")} fill="none" stroke={T.borderLt} strokeWidth={rv===1?1.5:.5}/>)}
    {cats.map((_,i)=>{const[x,y]=pt(i,1);return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={T.borderLt} strokeWidth=".5"/>;})}
    <polygon points={poly} fill="#1A1A1A12" stroke={T.ink} strokeWidth="1.8" strokeLinejoin="round"/>
    {vals.map((v,i)=>{const[x,y]=pt(i,v);return <circle key={i} cx={x} cy={y} r="3" fill={gc(grades[cats[i].k]||50)} stroke="#fff" strokeWidth="1"/>;})}
    {cats.map((c,i)=>{const[x,y]=pt(i,1.22);const g=grades[c.k]||50;return <text key={c.k} x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fontSize="8" fontFamily="Inter,sans-serif" fontWeight="700" fill={gc(g)}>{c.l} {g}</text>;})}
  </svg>;
}

function PlayerModal({player:p,onClose,onCompare,isInCompare,pctRanks}){

    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>

      <button onClick={onClose} style={{position:"absolute",top:12,right:12,background:T.bg,border:`1px solid ${T.border}`,borderRadius:4,color:T.ink,width:26,height:26,cursor:"pointer",fontSize:18,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",zIndex:10,lineHeight:1,fontFamily:T.sans}}>×</button>
      {/* Header */}
      <div style={{padding:"28px 48px 24px 32px",borderBottom:`2px solid ${T.ink}`}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          {p.headshot?<img src={p.headshot} alt={p.name} style={{width:76,height:76,borderRadius:"50%",objectFit:"cover",border:`2px solid ${T.border}`,flexShrink:0}} onError={e=>{e.target.style.display="none"}}/>:<TeamBadge abbr={p.team} size={52} logo={p.teamLogo}/>}
          <div style={{flex:1}}>
            <div style={{fontFamily:T.display,fontWeight:700,fontSize:34,color:T.ink,letterSpacing:-.5,lineHeight:1}}>{p.name}</div>
            <div style={{display:"flex",gap:12,marginTop:8,fontSize:13,color:T.textDim,fontFamily:T.sans,flexWrap:"wrap"}}>
              <span style={{fontWeight:600}}>{p.position}</span>
              <span style={{color:T.border}}>|</span><span>{p.teamName}</span>
              <span style={{color:T.border}}>|</span><span>{p.age?`${p.age} yrs`:"—"}</span>
              <span style={{color:T.border}}>|</span><span>{p.heightCm?`${Math.floor(p.heightCm/2.54/12)}'${Math.round(p.heightCm/2.54%12)}"`:"—"}</span>
              <span style={{color:T.border}}>|</span><span>{p.weightKg?`${Math.round(p.weightKg*2.205)} lbs`:"—"}</span>

    const sorted={};keys.forEach(k=>{sorted[k]=[...players].map(p=>parseFloat(p[k])||0).sort((a,b)=>a-b);});
    const rank=(arr,v)=>Math.round((arr.filter(x=>x<v).length/Math.max(arr.length-1,1))*100);
    const out={};players.forEach(p=>{const r={};keys.forEach(k=>{r[k]=rank(sorted[k],parseFloat(p[k])||0);});out[p.id]=r;});
    return out;
  },[players]);

  // Season leaders
  const leaders=useMemo(()=>{if(!players.length)return[];
    const cats=[
      {k:"goals",l:"Golden Boot",icon:"⚽",unit:"",desc:"Most goals scored"},
      {k:"assists",l:"Playmaker",icon:"🎯",unit:"",desc:"Most assists"},
      {k:"overall",l:"Best Overall",icon:"🏆",unit:"",desc:"Highest overall grade"},
      {k:"keyPasses",l:"Key Passer",icon:"🔑",unit:"",desc:"Most key passes"},
      {k:"tackles",l:"Tackler",icon:"🛡",unit:"",desc:"Most tackles won"},
      {k:"dribbles",l:"Dribbler",icon:"💨",unit:"",desc:"Most successful dribbles"},
      {k:"pressures",l:"Presser",icon:"⚡",unit:"",desc:"Most pressures applied"},
      {k:"sca",l:"Creator",icon:"✨",unit:"",desc:"Most shot-creating actions"},
    ];
    return cats.map(c=>{const sorted=[...players].filter(p=>parseFloat(p[c.k])>0).sort((a,b)=>(parseFloat(b[c.k])||0)-(parseFloat(a[c.k])||0));return{...c,top:sorted.slice(0,5)};}).filter(c=>c.top.length>0);
  },[players]);

  // Power Rankings — simulated previous week via deterministic offset per team
  const powerRankings=useMemo(()=>{
    if(!enrichedTeams.length||enrichedTeams[0].count===0)return[];
    const current=enrichedTeams.map((t,i)=>({...t,rank:i+1}));
    // Simulate previous ranks: hash team abbr for a consistent offset
    const hash=(s)=>s.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
    const prev=current.map(t=>{const off=((hash(t.abbr)*7+3)%9)-4;return{abbr:t.abbr,prevRank:Math.max(1,Math.min(30,t.rank+off))};});
    // Resolve ties — shuffle duplicates
    const used=new Set();const resolved=[];
    prev.sort((a,b)=>a.prevRank-b.prevRank).forEach(p=>{let r=p.prevRank;while(used.has(r))r++;used.add(r);resolved.push({abbr:p.abbr,prevRank:r});});
    const prevMap={};resolved.forEach(r=>{prevMap[r.abbr]=r.prevRank;});

    // Generate a short blurb per team
    const blurb=(t)=>{
      const parts=[];
      if(t.attack>=78)parts.push("elite attacking output");
      else if(t.attack<=55)parts.push("struggling in front of goal");
      if(t.defense>=78)parts.push("rock-solid defensive unit");
      else if(t.defense<=55)parts.push("leaky at the back");
      if(t.creativity>=78)parts.push("creative playmaking");
      if(t.carrying>=78)parts.push("strong ball progression");
      if(t.topScorer&&t.topScorer.goals>=8)parts.push(`${t.topScorer.name} leading with ${t.topScorer.goals} goals`);
      if(!parts.length)parts.push("solid all-around performance");
      return parts.slice(0,2).join(". ")+".";
    };

    return current.map(t=>{
      const prev=prevMap[t.abbr]||t.rank;
      const move=prev-t.rank;
      return{...t,prevRank:prev,move,blurb:blurb(t)};
    });
  },[enrichedTeams]);

  const TABS=[{id:"players",l:"Player Grades"},{id:"defense",l:"Defense"},{id:"passing",l:"Passing"},{id:"teams",l:"Teams"},{id:"rankings",l:"Table"},{id:"leaders",l:"Leaders"},{id:"valuations",l:"Values"},{id:"positions",l:"Positional"},{id:"compare",l:"Compare"+(comparePlayers.length?` (${comparePlayers.length})`:"")}];
  const tbl="28px 1fr 48px 54px 46px 46px 56px 60px 52px 60px 48px 60px";

  return (
    <div style={{minHeight:"100vh",background:T.bg,fontFamily:T.sans,color:T.text}}>
      <style>{`

        *{box-sizing:border-box;margin:0;padding:0}
        @keyframes modalIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        @keyframes spin{to{transform:rotate(360deg)}}
        .rh{transition:background .12s}.rh:hover{background:${T.hoverRow}!important}
        ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:${T.border};border-radius:4px}
        ::selection{background:${T.gold}30}
        @media(max-width:768px){
          .resp-hide{display:none!important}
          .resp-col{flex-direction:column!important}
          .resp-grid2{grid-template-columns:1fr!important}
          .resp-grid3{grid-template-columns:1fr 1fr!important}
          .resp-pad{padding:16px!important}
          .resp-modal{max-width:100%!important;margin:8px!important;border-radius:8px!important}
          .resp-modal-stats{grid-template-columns:1fr 1fr!important}
          .resp-footer-cols{flex-direction:column!important;gap:16px!important}
        }
        @media(max-width:480px){
          .resp-grid3{grid-template-columns:1fr!important}
          .resp-modal-stats{grid-template-columns:1fr!important}
        }
      `}</style>

      {/* ═══ MASTHEAD ══════════════════════════════════════════════════════ */}
      <header style={{background:T.surface,padding:"0 24px",borderBottom:`1px solid ${T.border}`}}>
        <div style={{maxWidth:1200,margin:"0 auto",textAlign:"center",padding:"16px 0 12px"}}>
          <div onClick={()=>setTab("players")} style={{display:"inline-block"}}><Logo size={68} dark={dark}/></div>
          <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8,marginTop:8}}>
            <div style={{fontSize:12,color:T.textDim,fontFamily:T.sans,fontStyle:"italic"}}>
              {loading?"Generating player data...": `${players.length} players across ${MLS_TEAMS.length} clubs`}
            </div>
            <div style={{padding:"2px 10px",background:T.card,border:`1px solid ${T.border}`,borderRadius:4,fontSize:10,fontFamily:T.mono,fontWeight:700,color:T.ink}}>{season}</div>
          </div>
          <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:10,marginTop:8}}>
            {!loading&&<PlayerSearch players={players} onSelect={p=>setSel(p)}/>}
            <button onClick={()=>setShowGrading(true)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:4,padding:"4px 14px",cursor:"pointer",fontFamily:T.sans,fontWeight:600,fontSize:11,color:T.accent,letterSpacing:.5,transition:"border-color .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.accent} onMouseLeave={e=>e.currentTarget.style.borderColor=T.border}>How We Grade</button>
            <button onClick={()=>setShowAbout(true)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:4,padding:"4px 14px",cursor:"pointer",fontFamily:T.sans,fontWeight:600,fontSize:11,color:T.textDim,letterSpacing:.5}}>About</button>
            <button onClick={()=>setDark(d=>!d)} style={{background:"none",border:`1px solid ${T.border}`,borderRadius:4,padding:"4px 14px",cursor:"pointer",fontFamily:T.sans,fontWeight:600,fontSize:11,color:T.textDim,letterSpacing:.5}}>{dark?"☀ Light Mode":"☾ Dark Mode"}</button>
          </div>
        </div>
      </header>

      {/* ═══ HOW WE GRADE OVERLAY ════════════════════════════════════════ */}
      {showGrading&&<div onClick={()=>setShowGrading(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:1100,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(4px)"}}>
        <div onClick={e=>e.stopPropagation()} style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,width:"100%",maxWidth:760,maxHeight:"90vh",overflowY:"auto",animation:"modalIn .3s ease",boxShadow:"0 24px 60px rgba(0,0,0,.2)",position:"relative"}}>
          <button onClick={()=>setShowGrading(false)} style={{position:"absolute",top:12,right:12,background:T.bg,border:`1px solid ${T.border}`,borderRadius:4,color:T.ink,width:26,height:26,cursor:"pointer",fontSize:18,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",zIndex:10,lineHeight:1,fontFamily:T.sans}}>×</button>
          <div style={{padding:"28px 32px 24px",borderBottom:`2px solid ${T.ink}`}}>
            <div style={{fontFamily:T.display,fontWeight:700,fontSize:32,color:T.ink,letterSpacing:-.5}}>How We Grade</div>
            <div style={{fontSize:12,color:T.textDim,fontFamily:T.sans,marginTop:6}}>Our composite grading system evaluates every MLS player across six categories using advanced metrics.</div>
          </div>
          <div style={{padding:"24px 32px"}}>
            <div style={{fontSize:11,color:T.textDim,fontFamily:T.sans,lineHeight:1.7,marginBottom:20}}>
              Every player receives a grade from 42 to 99 in each category, calculated by ranking their per-90-minute production against all other players in the league. Grades are percentile-based — a score of 85+ means the player is in the top tier for that category relative to all MLS players.
            </div>

            <div style={{fontSize:10,color:T.textMute,fontWeight:700,letterSpacing:2,fontFamily:T.sans,marginBottom:8}}>GRADE SCALE</div>
            <div style={{display:"flex",gap:8,marginBottom:24,flexWrap:"wrap"}}>
              {[{min:85,label:"ELITE",c:T.gold},{min:75,label:"GREAT",c:T.green},{min:65,label:"ABOVE AVG",c:T.blue},{min:55,label:"AVERAGE",c:T.textDim},{min:42,label:"POOR",c:T.red}].map(g=>(
                <div key={g.label} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",background:`${g.c}10`,border:`1px solid ${g.c}25`,borderRadius:4}}>
                  <span style={{fontFamily:T.serif,fontWeight:700,fontSize:14,color:g.c}}>{g.min}+</span>
                  <span style={{fontSize:9,fontWeight:600,color:g.c,letterSpacing:.8}}>{g.label}</span>
                </div>
              ))}
            </div>

            <div style={{fontSize:10,color:T.textMute,fontWeight:700,letterSpacing:2,fontFamily:T.sans,marginBottom:12}}>SIX GRADE CATEGORIES</div>
            {[
              {name:"Overall",weight:"30% Goals Added + 20% Attack + 15% Passing + 15% Defense + 10% Creativity + 10% Carrying",desc:"The composite score. Heavily weights total on-field value contribution (Goals Added) while balancing all other dimensions of play."},
              {name:"Attack",weight:"35% xG/90 + 25% Key Passes/90 + 25% Big Chances/90 + 15% xA/90",desc:"Measures goal threat and chance involvement. Uses expected metrics to capture quality of chances created and taken, not just raw output."},
              {name:"Passing",weight:"30% Completion % + 30% Final Third Passes/90 + 25% Key Passes/90 + 15% Pass G+",desc:"Goes beyond completion rate. Progressive passes reward players who advance the ball into dangerous areas, not just sideways recyclers."},
              {name:"Defense",weight:"25% Defensive G+ + 25% Ball Recovery/90 + 25% Interceptions/90 + 25% Aerials/90",desc:"Captures both active defending (pressures, interceptions) and overall defensive value added. Aerial dominance matters for set pieces and crosses."},
              {name:"Creativity",weight:"35% Key Passes/90 + 35% Big Chances Created/90 + 30% xA/90",desc:"Specifically isolates playmaking ability. A player can score low on Attack but high on Creativity if they're creating for others rather than finishing."},
              {name:"Carrying",weight:"50% Successful Dribbles/90 + 30% Final Third Passes/90 + 20% Carry Risk",desc:"Ball progression through carrying. Rewards players who beat defenders and drive the ball forward, breaking defensive lines with the ball at their feet."},
            ].map(cat=>(
              <div key={cat.name} style={{marginBottom:16,padding:"14px 18px",background:T.surface,border:`1px solid ${T.borderLt}`,borderRadius:6}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontFamily:T.display,fontWeight:700,fontSize:16,color:T.ink}}>{cat.name}</span>

                <div style={{fontSize:10,color:T.accent,fontFamily:T.mono,fontWeight:600,marginBottom:6}}>{cat.weight}</div>

              </div>
            ))}

            <div style={{marginTop:20,padding:"14px 18px",background:T.card,borderRadius:6,border:`1px solid ${T.borderLt}`}}>
              <div style={{fontSize:10,color:T.textMute,fontWeight:700,letterSpacing:2,fontFamily:T.sans,marginBottom:8}}>DATA SOURCES</div>
              <div style={{fontSize:11,color:T.textDim,fontFamily:T.sans,lineHeight:1.7}}>
                Player data sourced from ESPN (boxscores, rosters, standings), American Soccer Analysis (xG, xA, Goals Added, pass analytics), and Sofascore (tackles, interceptions, duels, dribbles, final third passes, ball recoveries, market values). All grades computed from real, verifiable data.
              </div>
            </div>
          </div>
          <div style={{padding:"14px 32px",borderTop:`1px solid ${T.border}`,textAlign:"right"}}>
            <button onClick={()=>setShowGrading(false)} style={{background:T.ink,border:"none",color:T.bg,padding:"8px 22px",borderRadius:4,cursor:"pointer",fontFamily:T.sans,fontWeight:600,fontSize:11}}>Got It</button>
          </div>
        </div>
      </div>}

      {/* ═══ ABOUT OVERLAY ═══════════════════════════════════════════════ */}
      {showAbout&&<div onClick={()=>setShowAbout(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",zIndex:1100,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(4px)"}}>
        <div onClick={e=>e.stopPropagation()} className="resp-modal" style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,width:"100%",maxWidth:680,maxHeight:"90vh",overflowY:"auto",animation:"modalIn .3s ease",boxShadow:"0 24px 60px rgba(0,0,0,.2)",position:"relative"}}>
          <button onClick={()=>setShowAbout(false)} style={{position:"absolute",top:12,right:12,background:T.bg,border:`1px solid ${T.border}`,borderRadius:4,color:T.ink,width:26,height:26,cursor:"pointer",fontSize:18,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",zIndex:10,lineHeight:1,fontFamily:T.sans}}>×</button>
          <div style={{padding:"28px 32px 20px",borderBottom:`2px solid ${T.ink}`,display:"flex",alignItems:"center",gap:16}}>
            <Logo size={48} dark={dark}/>
            <div>
              <div style={{fontFamily:T.display,fontWeight:700,fontSize:24,color:T.ink,letterSpacing:-.5}}>About USA Footy Index</div>
              <div style={{fontSize:11,color:T.textDim,fontFamily:T.sans,marginTop:4}}>Advanced player analytics for Major League Soccer</div>
            </div>
          </div>
          <div style={{padding:"24px 32px"}}>
            <div style={{fontSize:12,color:T.text,fontFamily:T.sans,lineHeight:1.8,marginBottom:20}}>
              USA Footy Index is an independent analytics platform that brings PFF-style composite grading to MLS. We believe every fan deserves access to the kind of advanced player evaluation that has been standard in the NFL, NBA, and European football for years — but has been largely missing from the American soccer landscape.
            </div>

            <div style={{fontSize:10,color:T.ink,fontWeight:700,letterSpacing:2,fontFamily:T.sans,marginBottom:10}}>WHAT MAKES US DIFFERENT</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
              {[
                {icon:"📊",title:"Composite Grades",desc:"Six-category grading system (42-99) that distills complex stats into a single, comparable score per player."},
                {icon:"🔍",title:"Full Transparency",desc:"Every grade weight is published. No black boxes — you can see exactly why a player scored what they did."},
                {icon:"⚖️",title:"Per-90 Normalization",desc:"Stats are adjusted per 90 minutes played, so a 2,000-minute starter and a 600-minute rotation player can be fairly compared."},
                {icon:"📈",title:"Percentile Context",desc:"Raw numbers mean nothing without context. We show where every stat ranks against the entire league."},
              ].map(f=>(
                <div key={f.title} style={{padding:"14px 16px",background:T.surface,border:`1px solid ${T.borderLt}`,borderRadius:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:16}}>{f.icon}</span>
                    <span style={{fontFamily:T.serif,fontWeight:700,fontSize:13,color:T.ink}}>{f.title}</span>
                  </div>
                  <div style={{fontSize:10,color:T.textDim,fontFamily:T.sans,lineHeight:1.6}}>{f.desc}</div>
                </div>

            <div style={{fontSize:10,color:T.ink,fontWeight:700,letterSpacing:2,fontFamily:T.sans,marginBottom:10}}>THE ROAD AHEAD</div>
            <div style={{fontSize:11,color:T.textDim,fontFamily:T.sans,lineHeight:1.7,marginBottom:16}}>
              This is currently a prototype powered by AI-estimated data. The production version will feature live data from ESPN, American Soccer Analysis, and API-Football — covering real match-by-match stats, historical season comparisons back to 2024, form guides, match previews, and shareable player cards.
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
              {[
                {v:"6",l:"Grade Categories"},
                {v:"30",l:"MLS Clubs"},
                {v:"9",l:"Stat Fields per Player"},
              ].map(s=>(
                <div key={s.l} style={{textAlign:"center",padding:"12px 8px",background:T.card,borderRadius:6,border:`1px solid ${T.borderLt}`}}>
                  <div style={{fontFamily:T.display,fontWeight:700,fontSize:24,color:T.ink,lineHeight:1}}>{s.v}</div>
                  <div style={{fontSize:8,color:T.textMute,fontWeight:600,letterSpacing:.8,marginTop:4,fontFamily:T.sans,textTransform:"uppercase"}}>{s.l}</div>
                </div>
              ))}
            </div>

            <div style={{padding:"14px 18px",background:T.card,borderRadius:6,border:`1px solid ${T.borderLt}`}}>
              <div style={{fontSize:10,color:T.textMute,fontWeight:700,letterSpacing:2,fontFamily:T.sans,marginBottom:6}}>CREATED BY</div>
              <div style={{fontSize:12,color:T.text,fontFamily:T.sans,lineHeight:1.7}}>
                Brandon — soccer analytics enthusiast, builder. USA Footy Index is an independent project not affiliated with Major League Soccer, its clubs, or any data provider.
              </div>
            </div>
          </div>
          <div style={{padding:"14px 32px",borderTop:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:9,color:T.textMute,fontFamily:T.sans}}>© {CY} USA Footy Index</div>
            <button onClick={()=>setShowAbout(false)} style={{background:T.ink,border:"none",color:T.bg,padding:"8px 22px",borderRadius:4,cursor:"pointer",fontFamily:T.sans,fontWeight:600,fontSize:11}}>Close</button>
          </div>
        </div>
      </div>}

      {/* ═══ STICKY NAV ══════════════════════════════════════════════════ */}
      <nav style={{position:"sticky",top:0,zIndex:100,background:T.surface,borderBottom:`2px solid ${T.ink}`,padding:"0 24px",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"center",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          {TABS.map(t=><button key={t.id} onClick={()=>{setTab(t.id);if(t.id==="defense"){setSortKey("defense");setSortDir("desc");}else if(t.id==="passing"){setSortKey("passing");setSortDir("desc");}else if(t.id==="valuations"){setSortKey("marketValue");setSortDir("desc");}else if(t.id==="players"){setSortKey("overall");setSortDir("desc");}}} style={{flexShrink:0,background:"none",border:"none",color:tab===t.id?T.ink:T.textDim,padding:"10px 10px",cursor:"pointer",fontFamily:T.serif,fontWeight:tab===t.id?700:400,fontSize:13.5,letterSpacing:-.2,transition:"color .15s",borderBottom:tab===t.id?`2px solid ${T.accent}`:"2px solid transparent",whiteSpace:"nowrap"}}>{t.l}</button>)}
        </div>
      </nav>

      <main style={{maxWidth:1200,margin:"0 auto",padding:"28px 24px"}}>
        {/* Loading */}
        {loading&&<div style={{padding:"80px 0",textAlign:"center",animation:"fadeUp .5s ease"}}>
          <div style={{fontFamily:T.display,fontSize:18,color:T.textDim,marginBottom:16}}>{loadMsg}</div>
          <div style={{width:280,height:6,background:T.borderLt,borderRadius:3,margin:"0 auto",overflow:"hidden"}}>

          <div style={{display:"flex",justifyContent:"space-between",width:280,margin:"8px auto 0"}}>
            <span style={{fontSize:10,color:T.textMute,fontFamily:T.sans}}>{loadProgress}%</span>
            <span style={{fontSize:10,color:T.textMute,fontFamily:T.sans}}>

        {errMsg&&<div style={{padding:20,background:"#FEF2F2",border:`1px solid ${T.red}30`,borderRadius:6,marginBottom:20}}>
          <div style={{fontWeight:700,color:T.red,marginBottom:6,fontSize:13,fontFamily:T.serif}}>Data Load Error</div>
          <div style={{fontSize:11,color:T.textDim,fontFamily:T.mono,wordBreak:"break-all"}}>{errMsg}</div>
        </div>}

        {/* ═══ PLAYERS ═══════════════════════════════════════════════════════ */}
        {!loading&&tab==="players"&&<div style={{animation:"fadeUp .4s ease"}}>
          <div style={{display:"flex",gap:14,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
            <Select label="Position" value={posFilter} onChange={setPosFilter} width={130} options={["All","Forward","Midfielder","Defender","GK"]}/>
            <Select label="Sort" value={sortKey} onChange={v=>{setSortKey(v);setSortDir(v==="age"?"asc":"desc");}} width={130} options={[["overall","Overall"],["goals","Goals"],["assists","Assists"],["xg90","xG/90"],["totalGA","G+ Added"],["tackles","Tackles"],["passComp","Pass %"],["age","Age"],["team","Team"]]}/>
            <Select label="Team" value={teamFilter} onChange={setTeamFilter} width={200} options={teamOpts}/>

          {best&&<div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:6,padding:"20px 24px",marginBottom:24,display:"flex",alignItems:"center",gap:20,flexWrap:"wrap",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}>

              <StatChip label="xG" value={best.xGoals} color={T.textDim}/>
              <StatChip label="G+" value={best.totalGA} color={+best.totalGA>=0?T.green:T.red}/>
              <StatChip label="TKL" value={best.tackles!=null?best.tackles:"—"} color={T.textDim}/>
            </div>
          </div>}

          <TableWrap><div>
            <div style={{display:"grid",gridTemplateColumns:tbl,padding:"10px 14px",background:T.card,fontSize:11,color:T.textMute,fontWeight:600,letterSpacing:.8,borderBottom:`1px solid ${T.border}`,fontFamily:T.sans,textTransform:"uppercase"}}>
              <div style={{textAlign:"center"}}>#</div><div>Player</div>
              <ColHead label="Grd" sortKey="overall" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>
              <ColHead label="Age" sortKey="age" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>
              <ColHead label="G" sortKey="goals" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>
              <ColHead label="A" sortKey="assists" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>
              <ColHead label="xG/90" sortKey="xg90" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>
              <ColHead label="Pass%" sortKey="passComp" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>
              <ColHead label="Tkl" sortKey="tackles" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>
              <div style={{textAlign:"center"}}>Sh/SoT</div>
              <ColHead label="Fls" sortKey="fouls" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>
              <ColHead label="G+" sortKey="totalGA" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>
            </div>
            {filtered.map((p,i)=><div key={p.id} onClick={()=>setSel(p)} className="rh" style={{display:"grid",gridTemplateColumns:tbl,padding:"14px 14px",borderBottom:`1px solid ${T.borderLt}`,alignItems:"center",cursor:"pointer",animation:`fadeUp .25s ease both`,animationDelay:`${Math.min(i*12,250)}ms`}}>
              <div style={{fontFamily:T.serif,fontWeight:700,fontSize:16,color:i<3?T.accent:T.textMute,textAlign:"center"}}>{i+1}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><TeamBadge abbr={p.team} size={24} logo={p.teamLogo}/><div><div style={{fontFamily:T.serif,fontWeight:700,fontSize:15,color:T.ink}}>{p.name}</div><div style={{fontSize:12,color:T.textDim}}>{p.position} · {p.team}</div></div></div>
              <div style={{textAlign:"center"}}><Badge grade={p.overall} size="md"/></div>
              <div style={{fontSize:13,color:p.age&&+p.age<23?T.green:p.age&&+p.age>32?T.red:T.textDim,textAlign:"center",fontFamily:T.mono,fontWeight:500}}>{p.age||"—"}</div>
              <div style={{fontFamily:T.serif,fontWeight:700,fontSize:16,color:T.ink,background:hm(p.goals,20),borderRadius:3,textAlign:"center",padding:"2px 0"}}>{p.goals}</div>
              <div style={{fontFamily:T.serif,fontWeight:700,fontSize:16,color:T.ink,background:hm(p.assists,15),borderRadius:3,textAlign:"center",padding:"2px 0"}}>{p.assists}</div>
              <div style={{fontSize:12,color:T.textDim,fontFamily:T.mono,textAlign:"center"}}>{p.xg90}</div>
              <div style={{fontSize:14,color:T.textDim,fontFamily:T.mono,background:hm(+p.passComp,100),borderRadius:3,textAlign:"center",padding:"2px 0"}}>{p.passComp}%</div>
              <div style={{fontSize:15,color:T.ink,fontWeight:600,background:hm(p.tackles,40),borderRadius:3,textAlign:"center",padding:"2px 0"}}>{sv(p.tackles)}</div>
              <div style={{fontSize:13,color:T.textDim,textAlign:"center"}}>{p.shots!=null?`${p.shots}/${p.shotsOnTarget}`:"—"}</div>
              <div style={{fontSize:13,color:T.textDim,textAlign:"center"}}>{sv(p.fouls)}</div>
              <div style={{fontSize:14,color:+p.totalGA>=0?T.green:T.red,fontWeight:700,fontFamily:T.mono,background:hm(Math.abs(+p.totalGA),5),borderRadius:3,textAlign:"center",padding:"2px 0"}}>{+p.totalGA>=0?"+":""}{p.totalGA}</div>
            </div>)}
          </div></TableWrap>
        </div>}

        {/* ═══ DEFENSE ═══════════════════════════════════════════════════════ */}
        {!loading&&tab==="defense"&&(()=>{const c=POS[posFilter];const defData=[...players].filter(p=>(!c||c.includes(p.position))&&(teamFilter==="All"||p.team===teamFilter)&&(p.mins||0)>=minMins).sort((a,b)=>{const dir=sortDir==="asc"?1:-1;if(sortKey==="age")return dir*(parseFloat(a.age||99)-parseFloat(b.age||99));const av=Number(a[sortKey])||0,bv=Number(b[sortKey])||0;return dir*(av-bv);}).slice(0,100);
          return <div style={{animation:"fadeUp .4s ease"}}>
          <div style={{display:"flex",gap:14,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
            <Select label="Position" value={posFilter} onChange={setPosFilter} width={130} options={["All","Forward","Midfielder","Defender","GK"]}/>
            <Select label="Team" value={teamFilter} onChange={setTeamFilter} width={200} options={teamOpts}/>
            <Select label="Min. Mins" value={String(minMins)} onChange={v=>setMinMins(Number(v))} width={100} options={[["0","All"],["200","200+"],["400","400+"],["600","600+"],["900","900+"]]}/>
          </div>
          <TopCards players={defData} metric={p=>p.tackles} metricLabel="TACKLES" onSelect={setSel}/>
          <TableWrap><div>
            <div style={{display:"grid",gridTemplateColumns:"24px 1fr 48px 58px 58px 50px 50px 60px 56px",padding:"10px 14px",background:T.card,fontSize:11,color:T.textMute,fontWeight:600,letterSpacing:.8,borderBottom:`1px solid ${T.border}`,fontFamily:T.sans,textTransform:"uppercase"}}><div style={{textAlign:"center"}}>#</div><div>Player</div><ColHead label="Def" sortKey="defense" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="Tkl" sortKey="tackles" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="Prs" sortKey="pressures" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="Int" sortKey="interceptions" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="Fls" sortKey="fouls" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><div style={{textAlign:"center"}}>YC/RC</div><ColHead label="G+" sortKey="totalGA" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/></div>
            {defData.map((p,i)=><div key={p.id} onClick={()=>setSel(p)} className="rh" style={{display:"grid",gridTemplateColumns:"24px 1fr 48px 58px 58px 50px 50px 60px 56px",padding:"14px 14px",borderBottom:`1px solid ${T.borderLt}`,alignItems:"center",cursor:"pointer"}}>
              <div style={{fontFamily:T.serif,fontWeight:700,fontSize:16,color:i<3?T.accent:T.textMute,textAlign:"center"}}>{i+1}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><TeamBadge abbr={p.team} size={24} logo={p.teamLogo}/><div><div style={{fontFamily:T.serif,fontWeight:700,fontSize:15,color:T.ink}}>{p.name}</div><div style={{fontSize:12,color:T.textDim}}>{p.position} · {p.team}</div></div></div>
              <div style={{textAlign:"center"}}><Badge grade={p.defense} size="md"/></div>
              <div style={{fontFamily:T.serif,fontWeight:700,fontSize:16,color:T.ink,background:hm(p.tackles,40),borderRadius:3,textAlign:"center",padding:"2px 0"}}>{sv(p.tackles)}</div>
              <div style={{fontSize:15,color:T.ink,fontWeight:600,background:hm(p.pressures,300),borderRadius:3,textAlign:"center",padding:"2px 0"}}>{sv(p.pressures)}</div>
              <div style={{fontSize:14,color:T.textDim,background:hm(p.interceptions,40),borderRadius:3,textAlign:"center",padding:"2px 0"}}>{sv(p.interceptions)}</div>
              <div style={{fontSize:13,color:T.textDim,textAlign:"center"}}>{sv(p.fouls)}</div>
              <div style={{display:"flex",gap:4,justifyContent:"center",alignItems:"center"}}><div style={{width:8,height:10,borderRadius:1,background:"#E8C94A"}}/><span style={{fontSize:12}}>{sv(p.yellowCards)}</span><div style={{width:8,height:10,borderRadius:1,background:T.red}}/><span style={{fontSize:12}}>{sv(p.redCards)}</span></div>
              <div style={{fontSize:14,color:+p.totalGA>=0?T.green:T.red,fontWeight:700,fontFamily:T.mono,textAlign:"center"}}>{+p.totalGA>=0?"+":""}{p.totalGA}</div>
            </div>)}
          </div></TableWrap>
        </div>})()}

        {/* ═══ PASSING ═══════════════════════════════════════════════════════ */}
        {!loading&&tab==="passing"&&(()=>{const c=POS[posFilter];const passData=[...players].filter(p=>+p.passComp>0&&(!c||c.includes(p.position))&&(teamFilter==="All"||p.team===teamFilter)&&(p.mins||0)>=Math.max(minMins,200)).sort((a,b)=>{const dir=sortDir==="asc"?1:-1;if(sortKey==="age")return dir*(parseFloat(a.age||99)-parseFloat(b.age||99));const av=Number(a[sortKey])||0,bv=Number(b[sortKey])||0;return dir*(av-bv);}).slice(0,100);
          return <div style={{animation:"fadeUp .4s ease"}}>
          <div style={{display:"flex",gap:14,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
            <Select label="Position" value={posFilter} onChange={setPosFilter} width={130} options={["All","Forward","Midfielder","Defender","GK"]}/>
            <Select label="Team" value={teamFilter} onChange={setTeamFilter} width={200} options={teamOpts}/>
            <Select label="Min. Mins" value={String(minMins)} onChange={v=>setMinMins(Number(v))} width={100} options={[["0","All"],["200","200+"],["400","400+"],["600","600+"],["900","900+"]]}/>
          </div>
          <TopCards players={passData} metric={p=>p.passComp+"%"} metricLabel="COMPLETION" onSelect={setSel}/>
          <TableWrap><div>
            <div style={{display:"grid",gridTemplateColumns:"24px 1fr 48px 68px 68px 68px 56px 56px 56px",padding:"10px 14px",background:T.card,fontSize:11,color:T.textMute,fontWeight:600,letterSpacing:.8,borderBottom:`1px solid ${T.border}`,fontFamily:T.sans,textTransform:"uppercase"}}><div style={{textAlign:"center"}}>#</div><div>Player</div><ColHead label="Pass" sortKey="passing" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="Comp%" sortKey="passComp" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><div style={{textAlign:"center"}}>xComp%</div><div style={{textAlign:"center"}}>vs Exp</div><ColHead label="PrgP" sortKey="prgPasses" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="F3rd" sortKey="ftPasses" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="G+" sortKey="totalGA" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/></div>
            {passData.map((p,i)=>{const ae=Number(p.passAboveExp);return <div key={p.id} onClick={()=>setSel(p)} className="rh" style={{display:"grid",gridTemplateColumns:"24px 1fr 48px 68px 68px 68px 56px 56px 56px",padding:"14px 14px",borderBottom:`1px solid ${T.borderLt}`,alignItems:"center",cursor:"pointer"}}>
              <div style={{fontFamily:T.serif,fontWeight:700,fontSize:16,color:i<3?T.accent:T.textMute,textAlign:"center"}}>{i+1}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><TeamBadge abbr={p.team} size={24} logo={p.teamLogo}/><div><div style={{fontFamily:T.serif,fontWeight:700,fontSize:15,color:T.ink}}>{p.name}</div><div style={{fontSize:12,color:T.textDim}}>{p.position} · {p.team}</div></div></div>
              <div style={{textAlign:"center"}}><Badge grade={p.passing} size="md"/></div>
              <div style={{fontSize:14,color:T.ink,fontFamily:T.mono,fontWeight:600,background:hm(+p.passComp,100),borderRadius:3,textAlign:"center",padding:"2px 0"}}>{p.passComp}%</div>
              <div style={{fontSize:12,color:T.textDim,fontFamily:T.mono,textAlign:"center"}}>{p.xPassComp}%</div>
              <div style={{fontSize:12,color:ae>=0?T.green:T.red,fontWeight:700,fontFamily:T.mono,textAlign:"center"}}>{ae>=0?"+":""}{p.passAboveExp||"—"}%</div>
              <div style={{fontSize:13,color:T.ink,fontWeight:600,background:hm(p.prgPasses,120),borderRadius:3,textAlign:"center",padding:"2px 0"}}>{sv(p.keyPasses)}</div>
              <div style={{fontSize:11,color:T.textDim,textAlign:"center"}}>{sv(p.ftPasses)}</div>
              <div style={{fontSize:11,color:+p.passGA>=0?T.green:T.red,fontWeight:700,fontFamily:T.mono,textAlign:"center"}}>{+p.passGA>=0?"+":""}{p.passGA}</div>
            </div>;})}
          </div></TableWrap>
        </div>})()}

        {/* ═══ TEAMS ═════════════════════════════════════════════════════════ */}
        {!loading&&tab==="teams"&&<div style={{animation:"fadeUp .4s ease"}}>
          <div style={{marginBottom:16}}><Select label="Conference" value={confFilter} onChange={setConfFilter} width={150} options={["All","Eastern","Western"]}/></div>
          <TableWrap><div>
            <div style={{display:"grid",gridTemplateColumns:"36px 1fr 50px 52px 80px 36px",padding:"10px 14px",background:T.card,fontSize:11,color:T.textMute,fontWeight:600,letterSpacing:.8,borderBottom:`1px solid ${T.border}`,fontFamily:T.sans,textTransform:"uppercase"}}><div>Rk</div><div>Team</div><div style={{textAlign:"center"}}>Grade</div><div style={{textAlign:"center"}}>Plrs</div><div style={{textAlign:"center"}}>Squad Val</div><div></div></div>
            {enrichedTeams.filter(t=>confFilter==="All"||t.conf===confFilter).map((t,i)=>{
              const isOpen=expandTeam===t.abbr;
              const level=isOpen?teamLevel:0;
              const rosterTbl="1fr 40px 44px 36px 36px 48px 48px 42px 42px 50px";
              const rosterRaw=players.filter(p=>p.team===t.abbr);
              const dir=rosterDir==="asc"?1:-1;
              const roster=[...rosterRaw].sort((a,b)=>{if(rosterSort==="age")return dir*(parseFloat(a.age||99)-parseFloat(b.age||99));const av=parseFloat(a[rosterSort])||a[rosterSort]||0,bv=parseFloat(b[rosterSort])||b[rosterSort]||0;return dir*(av-bv);});

              return <div key={t.abbr}>
                {/* Team row */}
                <div onClick={()=>toggleTeam(t.abbr)} className="rh" style={{display:"grid",gridTemplateColumns:"36px 1fr 50px 52px 80px 36px",padding:"14px 16px",borderBottom:`1px solid ${isOpen?T.border:T.borderLt}`,alignItems:"center",cursor:"pointer",background:isOpen?T.card:"transparent"}}>
                  <div style={{fontFamily:T.serif,fontWeight:700,fontSize:16,color:i<3?T.accent:T.textMute}}>{i+1}</div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}><TeamBadge abbr={t.abbr} size={34} logo={teamLogos[t.abbr]}/><div><div style={{fontFamily:T.serif,fontWeight:700,fontSize:18,color:T.ink}}>{t.name}</div><div style={{fontSize:12,color:T.textDim,fontFamily:T.sans}}>{t.conf}</div></div></div>
                  <div style={{textAlign:"center"}}><Badge grade={t.overall} size="md"/></div>
                  <div style={{fontSize:12,color:T.textDim,textAlign:"center"}}>{t.count}</div>
                  <div style={{fontFamily:T.serif,fontWeight:600,fontSize:12,color:vc(t.squadValue),textAlign:"center"}}>{t.squadValue>0?fv(t.squadValue):"—"}</div>
                  <div style={{fontSize:10,color:T.textMute,textAlign:"center"}}>{level===2?"▲":level===1?"▼▼":"▼"}</div>
                </div>

                {/* Level 1: Team stats */}
                {isOpen&&level>=1&&<div style={{background:T.card,padding:"16px 20px",borderBottom:level===1?`2px solid ${T.border}`:"none",animation:"fadeUp .2s ease"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <div style={{fontSize:9,color:T.textMute,fontWeight:600,letterSpacing:1.5,fontFamily:T.sans,textTransform:"uppercase"}}>{t.name} · Team Overview</div>
                    <div style={{fontSize:9,color:T.accent,fontWeight:600,fontFamily:T.sans,cursor:"pointer"}} onClick={e=>{e.stopPropagation();setTeamLevel(2);}}>View Roster →</div>
                  </div>

                  {/* Grade boxes */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8,marginBottom:16}}>
                    {[{l:"Overall",g:t.overall},{l:"Attack",g:t.attack},{l:"Passing",g:t.passing},{l:"Defense",g:t.defense},{l:"Creative",g:t.creativity},{l:"Carry",g:t.carrying}].map(r=>(
                      <div key={r.l} style={{background:T.bg,border:`1px solid ${T.borderLt}`,borderRadius:6,padding:"12px",textAlign:"center"}}>
                        <div style={{fontFamily:T.display,fontWeight:700,fontSize:26,color:gc(r.g),lineHeight:1}}>{r.g}</div>
                        <div style={{fontSize:7,color:gc(r.g),fontWeight:600,letterSpacing:1,marginTop:3,textTransform:"uppercase"}}>{gl(r.g)}</div>
                        <div style={{fontSize:9,color:T.textMute,marginTop:2,fontFamily:T.sans}}>{r.l}</div>
                      </div>
                    ))}
                  </div>

                  {/* Key stats row */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8}}>
                    {[
                      {l:"Total Goals",v:t.totalGoals,c:T.ink},
                      {l:"Total Assists",v:t.totalAssists,c:T.ink},
                      {l:"Avg Age",v:t.avgAge||"—",c:T.textDim},
                      {l:"Total Tackles",v:t.totalTackles,c:T.ink},
                      {l:"Squad Value",v:fv(t.squadValue),c:vc(t.squadValue)},
                      {l:"Players",v:t.count,c:T.textDim},
                    ].map(s=>(
                      <div key={s.l} style={{textAlign:"center",padding:"8px 4px",background:T.bg,borderRadius:4,border:`1px solid ${T.borderLt}`}}>
                        <div style={{fontFamily:T.serif,fontWeight:700,fontSize:16,color:s.c,lineHeight:1}}>{s.v}</div>
                        <div style={{fontSize:7,color:T.textMute,fontWeight:600,letterSpacing:.8,marginTop:4,fontFamily:T.sans,textTransform:"uppercase"}}>{s.l}</div>
                      </div>
                    ))}
                  </div>

                  {/* Standout players */}
                  {(t.topScorer||t.topRated)&&<div style={{display:"flex",gap:12,marginTop:14}}>
                    {t.topRated&&<div style={{flex:1,display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:T.bg,borderRadius:4,border:`1px solid ${T.borderLt}`,cursor:"pointer"}} onClick={e=>{e.stopPropagation();setSel(t.topRated);}}>
                      <div style={{width:4,height:24,borderRadius:2,background:gc(t.topRated.overall)}}/>
                      <div style={{flex:1}}><div style={{fontSize:8,color:T.textMute,fontWeight:600,letterSpacing:1,fontFamily:T.sans}}>TOP RATED</div><div style={{fontFamily:T.serif,fontWeight:700,fontSize:13,color:T.ink}}>{t.topRated.name}</div></div>
                      <Badge grade={t.topRated.overall} size="sm"/>
                    </div>}
                    {t.topScorer&&t.topScorer.id!==t.topRated?.id&&<div style={{flex:1,display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:T.bg,borderRadius:4,border:`1px solid ${T.borderLt}`,cursor:"pointer"}} onClick={e=>{e.stopPropagation();setSel(t.topScorer);}}>
                      <div style={{width:4,height:24,borderRadius:2,background:T.accent}}/>
                      <div style={{flex:1}}><div style={{fontSize:8,color:T.textMute,fontWeight:600,letterSpacing:1,fontFamily:T.sans}}>TOP SCORER</div><div style={{fontFamily:T.serif,fontWeight:700,fontSize:13,color:T.ink}}>{t.topScorer.name}</div></div>
                      <div style={{fontFamily:T.serif,fontWeight:700,fontSize:16,color:T.ink}}>{t.topScorer.goals}G</div>
                    </div>}
                  </div>}
                </div>}

                {/* Level 2: Full sortable roster */}
                {isOpen&&level===2&&<div style={{background:T.card,borderBottom:`2px solid ${T.border}`,padding:"12px 16px",animation:"fadeUp .2s ease"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{fontSize:9,color:T.textMute,fontWeight:600,letterSpacing:1.5,fontFamily:T.sans,textTransform:"uppercase"}}>{t.name} Roster · {roster.length} Players</div>
                    <div style={{fontSize:9,color:T.accent,fontWeight:600,fontFamily:T.sans,cursor:"pointer"}} onClick={e=>{e.stopPropagation();setTeamLevel(1);}}>← Back to Stats</div>
                  </div>
                  {roster.length===0?<div style={{padding:16,textAlign:"center",color:T.textDim,fontSize:12,fontStyle:"italic"}}>No players loaded</div>
                  :<>
                    <div style={{display:"grid",gridTemplateColumns:rosterTbl,fontSize:11,color:T.textMute,fontWeight:600,letterSpacing:.8,fontFamily:T.sans,textTransform:"uppercase",padding:"6px 8px",borderBottom:`1px solid ${T.borderLt}`,marginBottom:2}}>
                      <div>Player</div>
                      <ColHead label="Grd" sortKey="overall" currentSort={rosterSort} currentDir={rosterDir} onSort={toggleRosterSort}/>
                      <ColHead label="Age" sortKey="age" currentSort={rosterSort} currentDir={rosterDir} onSort={toggleRosterSort} center/>
                      <ColHead label="G" sortKey="goals" currentSort={rosterSort} currentDir={rosterDir} onSort={toggleRosterSort}/>
                      <ColHead label="A" sortKey="assists" currentSort={rosterSort} currentDir={rosterDir} onSort={toggleRosterSort}/>
                      <ColHead label="Pass%" sortKey="passComp" currentSort={rosterSort} currentDir={rosterDir} onSort={toggleRosterSort}/>
                      <ColHead label="Tkl" sortKey="tackles" currentSort={rosterSort} currentDir={rosterDir} onSort={toggleRosterSort}/>
                      <ColHead label="Fls" sortKey="fouls" currentSort={rosterSort} currentDir={rosterDir} onSort={toggleRosterSort}/>
                      <ColHead label="G+" sortKey="totalGA" currentSort={rosterSort} currentDir={rosterDir} onSort={toggleRosterSort}/>
                      <div>Value</div>
                    </div>
                    {roster.map(p=>(
                      <div key={p.id} onClick={e=>{e.stopPropagation();setSel(p);}} className="rh" style={{display:"grid",gridTemplateColumns:rosterTbl,padding:"7px 8px",alignItems:"center",cursor:"pointer",borderBottom:`1px solid ${T.borderLt}`}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:4,height:4,borderRadius:"50%",background:gc(p.overall),flexShrink:0}}/>
                          <div><div style={{fontFamily:T.serif,fontWeight:600,fontSize:12,color:T.ink}}>{p.name}</div><div style={{fontSize:8,color:T.textMute}}>{p.position}</div></div>
                        </div>
                        <Badge grade={p.overall} size="sm"/>
                        <div style={{fontSize:12,color:T.textDim,fontFamily:T.mono,textAlign:"center"}}>{p.age||"—"}</div>
                        <div style={{fontFamily:T.serif,fontWeight:700,fontSize:12,color:T.ink}}>{p.goals}</div>
                        <div style={{fontFamily:T.serif,fontWeight:700,fontSize:12,color:T.ink}}>{p.assists}</div>
                        <div style={{fontSize:12,color:T.textDim,fontFamily:T.mono}}>{p.passComp}%</div>
                        <div style={{fontSize:10,color:T.ink,fontWeight:600}}>{sv(p.tackles)}</div>

        {/* ═══ POWER RANKINGS ═══════════════════════════════════════════════ */}

            if(b.pts!==a.pts)return b.pts-a.pts;if(b.gd!==a.gd)return b.gd-a.gd;return b.gf-a.gf;
          }).map((t,i)=>({...t,rank:i+1}));

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:20,flexWrap:"wrap",gap:10}}>

              <div style={{fontFamily:T.display,fontWeight:700,fontSize:26,color:T.ink,letterSpacing:-.5}}>MLS Table</div>
              <div style={{fontSize:12,color:T.textMute,fontFamily:T.sans,marginTop:4}}>Standings with composite team grades</div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Select label="Conference" value={confFilter} onChange={setConfFilter} width={130} options={["All","Eastern","Western"]}/>

            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"40px 44px 220px 70px 100px 80px 44px 44px 44px 44px 1fr",padding:"8px 16px",fontSize:9,color:T.textMute,fontWeight:600,letterSpacing:.8,fontFamily:T.sans,textTransform:"uppercase",borderBottom:`1px solid ${T.border}`}}>
            <div style={{textAlign:"center"}}>#</div><div></div><div>Team</div><div style={{textAlign:"center"}}>Record</div><div style={{textAlign:"center"}}>Pts / GD</div><div style={{textAlign:"center"}}>GF / GA</div><div style={{textAlign:"center"}}>OVR</div><div style={{textAlign:"center"}}>ATT</div><div style={{textAlign:"center"}}>PAS</div><div style={{textAlign:"center"}}>DEF</div><div style={{textAlign:"right"}}>Best Player</div>
          </div>
          {ranked.map((t,i)=>{const isTop3=i<3;return <div key={t.abbr} style={{display:"grid",gridTemplateColumns:"40px 44px 220px 70px 100px 80px 44px 44px 44px 44px 1fr",padding:isTop3?"14px 16px":"11px 16px",alignItems:"center",background:isTop3?T.surface:"transparent",borderBottom:`1px solid ${T.borderLt}`,borderLeft:isTop3?`3px solid ${T.gold}`:"3px solid transparent"}}>

            <TeamBadge abbr={t.abbr} size={isTop3?36:28} logo={teamLogos[t.abbr]}/>
            <div><div style={{fontFamily:T.serif,fontWeight:700,fontSize:isTop3?16:14,color:T.ink}}>{t.name}</div><div style={{fontSize:10,color:T.textDim,fontFamily:T.sans}}>{t.conf}</div></div>
            <div style={{textAlign:"center",fontFamily:T.mono,fontSize:12,color:T.textDim,fontWeight:600}}>{t.w}-{t.dr}-{t.l}</div>
            <div style={{textAlign:"center"}}><span style={{fontFamily:T.serif,fontWeight:700,fontSize:15,color:T.ink}}>{t.pts}</span><span style={{fontSize:11,color:t.gd>0?T.green:t.gd<0?T.red:T.textMute,fontFamily:T.mono,fontWeight:600,marginLeft:8}}>{t.gd>0?"+":""}{t.gd}</span></div>
            <div style={{textAlign:"center",fontSize:11,color:T.textDim,fontFamily:T.mono}}>{t.gf} / {t.ga}</div>
            <div style={{textAlign:"center",fontFamily:T.serif,fontWeight:700,fontSize:14,color:gc(t.overall)}}>{t.overall}</div>
            <div style={{textAlign:"center",fontFamily:T.serif,fontWeight:700,fontSize:14,color:gc(t.attack)}}>{t.attack}</div>
            <div style={{textAlign:"center",fontFamily:T.serif,fontWeight:700,fontSize:14,color:gc(t.passing)}}>{t.passing}</div>
            <div style={{textAlign:"center",fontFamily:T.serif,fontWeight:700,fontSize:14,color:gc(t.defense)}}>{t.defense}</div>
            <div style={{textAlign:"right"}}>{t.topRated&&<div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"3px 10px",background:T.card,borderRadius:4,border:`1px solid ${T.borderLt}`,cursor:"pointer"}} onClick={()=>setSel(t.topRated)}><span style={{fontSize:11,fontFamily:T.serif,fontWeight:600,color:T.ink}}>{t.topRated.name}</span><Badge grade={t.topRated.overall} size="sm"/></div>}</div>
          </div>;})}
          <div style={{marginTop:16,fontSize:9,color:T.textMute,fontFamily:T.sans,fontStyle:"italic",textAlign:"center"}}>Ranked by MLS standings points. Grades from real stats via ESPN, ASA, and Sofascore.</div>
        </div>})()}

        {/* ═══ LEADERS TAB ═══════════════════════════════════════════════════ */}
        {!loading&&tab==="leaders"&&<div style={{animation:"fadeUp .4s ease"}}>
          <div style={{fontFamily:T.display,fontWeight:700,fontSize:22,color:T.ink,letterSpacing:-.5,marginBottom:4}}>Season Leaders</div>

                      <div style={{fontSize:8,color:T.textMute}}>{p.position} · {p.team}</div>
                    </div>
                    <div style={{fontFamily:T.serif,fontWeight:700,fontSize:18,color:i===0?T.ink:T.textDim}}>{parseFloat(p[cat.k])||0}</div>
                    <Badge grade={p.overall} size="sm"/>

        </div>}

        {/* ═══ VALUES ════════════════════════════════════════════════════════ */}
        {!loading&&tab==="valuations"&&<div style={{animation:"fadeUp .4s ease"}}>
          <div style={{display:"flex",gap:14,marginBottom:20,flexWrap:"wrap"}}>

          </div>
          <TopCards players={filtered} metric={p=>fv(p.marketValue)} metricLabel="VALUE" onSelect={setSel}/>
          <TableWrap><div>
            <div style={{display:"grid",gridTemplateColumns:"24px 1fr 130px 48px 44px 44px 52px",padding:"10px 14px",background:T.card,fontSize:11,color:T.textMute,fontWeight:600,letterSpacing:.8,borderBottom:`1px solid ${T.border}`,fontFamily:T.sans,textTransform:"uppercase"}}><div style={{textAlign:"center"}}>#</div><div>Player</div><ColHead label="Value" sortKey="marketValue" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort}/><ColHead label="Grade" sortKey="overall" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="G" sortKey="goals" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="A" sortKey="assists" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="Min" sortKey="mins" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/></div>
            {filtered.map((p,i)=><div key={p.id} onClick={()=>setSel(p)} className="rh" style={{display:"grid",gridTemplateColumns:"24px 1fr 130px 48px 44px 44px 52px",padding:"14px 14px",borderBottom:`1px solid ${T.borderLt}`,alignItems:"center",cursor:"pointer"}}>

              <div style={{textAlign:"center"}}><span style={{fontFamily:T.serif,fontWeight:700,fontSize:15,color:vc(p.marketValue)}}>{fv(p.marketValue)}</span></div>

              </div>
              <div style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:10,color:T.textDim,fontWeight:600}}>Avg Grade</span><span style={{fontSize:10,color:gc(b.avg),fontWeight:700}}>{gl(b.avg)}</span></div>

            </div>)}
          </div>}

        {/* ═══ COMPARE TAB ═══════════════════════════════════════════════════ */}
        {!loading&&tab==="compare"&&(()=>{
          const cp=comparePlayers;
          const compColors=["#C1272D","#264653","#B68D40"];
          const compBar=(label,key,max,unit)=>{

            return <div style={{marginBottom:10}}>
              <div style={{fontSize:10,color:T.textDim,fontWeight:600,fontFamily:T.sans,marginBottom:5}}>{label}</div>

              {pRes.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:T.surface,border:`1px solid ${T.border}`,borderTop:"none",borderBottomLeftRadius:6,borderBottomRightRadius:6,zIndex:50,boxShadow:"0 8px 24px rgba(0,0,0,.1)",maxHeight:240,overflowY:"auto"}}>

                    {compBar("Comp %","passComp",100,"%")}{compBar("Prg Passes","prgPasses",120)}{compBar("Final 3rd","ftPasses",50)}{compBar("Goals Added","totalGA",5)}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginTop:16}}>
                  <div>
                    <div style={{fontSize:10,color:T.ink,fontWeight:700,letterSpacing:2,marginBottom:12,fontFamily:T.sans,borderBottom:`1px solid ${T.borderLt}`,paddingBottom:6}}>DEFENSIVE</div>
                    {compBar("Tackles","tackles",40)}{compBar("Pressures","pressures",300)}{compBar("Interceptions","interceptions",40)}{compBar("Aerials Won","aerials",50)}{compBar("Fouls","fouls",25)}
                  </div>
                  <div>
                    <div style={{fontSize:10,color:T.ink,fontWeight:700,letterSpacing:2,marginBottom:12,fontFamily:T.sans,borderBottom:`1px solid ${T.borderLt}`,paddingBottom:6}}>GRADES</div>
                    {compBar("Overall","overall",99)}{compBar("Attack","attack",99)}{compBar("Passing","passing",99)}{compBar("Defense","defense",99)}{compBar("Creativity","creativity",99)}{compBar("Carrying","carrying",99)}
                  </div>
                </div>
                {/* Physical comparison */}
                <div style={{marginTop:20,borderTop:`1px solid ${T.borderLt}`,paddingTop:16}}>
                  <div style={{fontSize:10,color:T.ink,fontWeight:700,letterSpacing:2,marginBottom:12,fontFamily:T.sans}}>PHYSICAL & VALUE</div>
                  <div style={{display:"grid",gridTemplateColumns:`repeat(${cp.length},1fr)`,gap:12}}>
                    {cp.map((p,i)=>(
                      <div key={p.id} style={{textAlign:"center"}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:compColors[i],margin:"0 auto 8px"}}/>
                        <div style={{fontFamily:T.serif,fontWeight:700,fontSize:16,color:T.ink}}>{p.name.split(" ").slice(-1)[0]}</div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:8}}>
                          <div style={{padding:"6px",background:T.card,borderRadius:4}}>
                            <div style={{fontFamily:T.mono,fontSize:13,fontWeight:700,color:T.ink}}>{p.age||"—"}</div>
                            <div style={{fontSize:7,color:T.textMute,letterSpacing:.8}}>AGE</div>
                          </div>
                          <div style={{padding:"6px",background:T.card,borderRadius:4}}>
                            <div style={{fontFamily:T.mono,fontSize:13,fontWeight:700,color:T.ink}}>{p.heightCm?`${Math.floor(p.heightCm/2.54/12)}'${Math.round(p.heightCm/2.54%12)}"`:"—"}</div>
                            <div style={{fontSize:7,color:T.textMute,letterSpacing:.8}}>HEIGHT</div>
                          </div>
                          <div style={{padding:"6px",background:T.card,borderRadius:4}}>
                            <div style={{fontFamily:T.mono,fontSize:13,fontWeight:700,color:T.ink}}>{p.weightKg?`${Math.round(p.weightKg*2.205)}`:"\u2014"}</div>
                            <div style={{fontSize:7,color:T.textMute,letterSpacing:.8}}>LBS</div>
                          </div>
                          <div style={{padding:"6px",background:T.card,borderRadius:4}}>
                            <div style={{fontFamily:T.mono,fontSize:13,fontWeight:700,color:vc(p.marketValue)}}>{fv(p.marketValue)}</div>
                            <div style={{fontSize:7,color:T.textMute,letterSpacing:.8}}>VALUE</div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>}

            {cp.length<2&&<div style={{textAlign:"center",padding:40,color:T.textDim,fontFamily:T.serif,fontStyle:"italic",fontSize:14}}>
              {cp.length===0?"Add at least 2 players to compare":"Add one more player to start comparing"}
            </div>}
          </div>;
        })()}
      </main>

      <footer style={{borderTop:`1px solid ${T.border}`,padding:"24px 24px 20px",marginTop:40}}>
        <div style={{maxWidth:1200,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:20}}>
            <div>
              <Logo size={36} dark={dark}/>
              <div style={{fontSize:9,color:T.textMute,fontFamily:T.sans,marginTop:8,lineHeight:1.6,maxWidth:280}}>Advanced player analytics and composite grading for Major League Soccer. Not affiliated with MLS or its clubs. Player images and team logos courtesy of ESPN.</div>
            </div>
            <div className="resp-footer-cols" style={{display:"flex",gap:32}}>
              <div>
                <div style={{fontSize:8,color:T.textMute,fontWeight:700,letterSpacing:1.5,fontFamily:T.sans,textTransform:"uppercase",marginBottom:8}}>Explore</div>
                {["Player Grades","Defense","Passing","Teams","Rankings","Leaders"].map(l=><div key={l} style={{fontSize:10,color:T.textDim,fontFamily:T.sans,marginBottom:4,cursor:"pointer"}} onClick={()=>setTab(l==="Player Grades"?"players":l.toLowerCase())}>{l}</div>)}
              </div>
              <div>
                <div style={{fontSize:8,color:T.textMute,fontWeight:700,letterSpacing:1.5,fontFamily:T.sans,textTransform:"uppercase",marginBottom:8}}>Tools</div>
                {[["Compare","compare"],["Values","valuations"],["Positional","positions"]].map(([l,id])=><div key={id} style={{fontSize:10,color:T.textDim,fontFamily:T.sans,marginBottom:4,cursor:"pointer"}} onClick={()=>setTab(id)}>{l}</div>)}
                <div style={{fontSize:10,color:T.accent,fontFamily:T.sans,marginBottom:4,cursor:"pointer"}} onClick={()=>setShowGrading(true)}>How We Grade</div>
              </div>
              <div>
                <div style={{fontSize:8,color:T.textMute,fontWeight:700,letterSpacing:1.5,fontFamily:T.sans,textTransform:"uppercase",marginBottom:8}}>Info</div>
                <div style={{fontSize:10,color:T.accent,fontFamily:T.sans,marginBottom:4,cursor:"pointer"}} onClick={()=>setShowAbout(true)}>About</div>
                <div style={{fontSize:10,color:T.textDim,fontFamily:T.sans,marginBottom:4}}>Data via Claude AI</div>
                <div style={{fontSize:10,color:T.textDim,fontFamily:T.sans,marginBottom:4}}>Season: {season}</div>
                <div style={{fontSize:10,color:T.textDim,fontFamily:T.sans}}>v8 Prototype</div>
              </div>
            </div>
          </div>
          <div style={{borderTop:`1px solid ${T.borderLt}`,marginTop:16,paddingTop:12,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:9,color:T.textMute,fontFamily:T.sans}}>© {CY} USA Footy Index. All rights reserved.</div>
            <div style={{fontSize:9,color:T.textMute,fontFamily:T.sans}}>Created by Brandon</div>
          </div>
        </div>
      </footer>

      {sel&&<PlayerModal player={sel} onClose={()=>setSel(null)} onCompare={addCompare} isInCompare={comparePlayers.some(c=>c.id===sel.id)} pctRanks={pctRanks[sel.id]}/>}
    </div>
  );
}

// Render
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(MLSAnalytics));
  </script>
</body>
</html>
