// Grade engine
function pct(a,v){const s=[...a].sort((x,y)=>x-y);return s.filter(x=>x<v).length/Math.max(s.length,1);}

  if(t==="df"||t==="d"||t==="def"||t.includes("defen")||t.includes("back"))return"Defender";

function toG(p){return Math.round(42+Math.max(0,Math.min(1,p))*57);}
function computeGrades(ps){
  if(!ps.length)return{};

  const xg=v("xg90"),xa=v("xa90"),ga=v("tga"),df=v("dga"),pc=v("pc"),pg=v("pga");

  const gkPc=gks.map(p=>p.pc||0);
  const gkPrs=gks.map(p=>p.prs90||0);
  const gkArl=gks.map(p=>p.arl90||0);
  const gkPrgp=gks.map(p=>p.prgp90||0);

  const gksWithMls=gks.filter(p=>(p.gkEff90||0)!==0);
  const gkEffPool=gksWithMls.map(p=>p.gkEff90||0);
  const gkSvMlsPool=gksWithMls.map(p=>p.svMls90||0);
  const gkMlsPrsPool=gksWithMls.map(p=>p.mlsPrs90||0);
  const gkDpasPool=gksWithMls.map(p=>p.dpas90||0);
  const gkPassPerfPool=gksWithMls.map(p=>p.passPerf90||0);
  const gkDpasPctPool=gksWithMls.map(p=>p.dpasPct||0);
  const gkPassesPctPool=gksWithMls.map(p=>p.passesPctMls||0);
  const gkClaimPool=gksWithMls.map(p=>p.claim90||0);
  const gkSweepMlsPool=gksWithMls.map(p=>p.sweep90||0);
  const gkAerRatePool=gksWithMls.map(p=>p.aerWonRate||0);

  // ── [OPT1] League-wide OUTFIELD pools (universal sub-grades; GKs excluded) ──
  // Sub-grades rank against ALL outfielders, so "90 Defense" = elite defender
  // league-wide. Overall stays position-weighted + position-rescaled (pass 2).
  const ofs=ps.filter(p=>!p.isGK);
  const mk=(arr,k)=>arr.map(p=>p[k]).filter(x=>typeof x==="number"&&x!==0);/*GRADEFULL*/
  const ofXg=mk(ofs,"xg90"),ofXa=mk(ofs,"xa90"),ofGa=mk(ofs,"tga"),ofDf=mk(ofs,"dga"),ofPc=mk(ofs,"pc"),ofPg=mk(ofs,"pga"),ofKp=mk(ofs,"kp90"),ofSca=mk(ofs,"sca90"),ofFtp=mk(ofs,"ftp90"),ofPrs=mk(ofs,"prs90"),ofIntc=mk(ofs,"intc90"),ofArl=mk(ofs,"arl90"),ofDrb=mk(ofs,"drb90"),ofPrgc=mk(ofs,"prgc90"),ofOxg=mk(ofs,"oxg90"),ofChc=mk(ofs,"chc90"),ofGdr=mk(ofs,"gdrV"),ofEsc=mk(ofs,"escV"),ofPresR=mk(ofs,"presRV"),ofPassPerf=mk(ofs,"passPerfV"),ofClr=mk(ofs,"clr90"),ofFls=mk(ofs,"flSuf90"),ofArlPct=mk(ofs,"arlPctV");

  // Single outfield composite collector (sub-grades ranked league-wide pass 2;
  // overall ranked within position pass 2)
  const __mn=new Map();const mn=(a)=>{if(!__mn.has(a))__mn.set(a,a.length?a.reduce((t,x)=>t+x,0)/a.length:0);return __mn.get(a);};const K90S=8;
  const ofComposites=[];

  const gkComposites=[];

  const o={};

    if(p.isGK&&gks.length>=3){

        ?Sg(gkEffPool,p.gkEff90)*.50+Sg(gkSvMlsPool,p.svMls90)*.30+Sg(gkCs,p.csRate)*.20
        :Sg(gkSv,p.sv90)*.60+Sg(gkCs,p.csRate)*.40;
      // Distribution (mapped to "passing"): pass completion 50%, progressive passes/90 50%
      const dist=hasGkEff
        ?Sg(gkPassPerfPool,p.passPerf90)*.50+Sg(gkPassesPctPool,p.passesPctMls)*.25+Sg(gkDpasPctPool,p.dpasPct)*.25
        :Sg(gkPc,p.pc)*.50+Sg(gkPrgp,p.prgp90)*.50;

      const gcInv=gkGa.length>1?1-Sg(gkGa,p.gaCon90):0.5; // lower GA = better (minutes-regressed)
      const command=hasGkEff
        ?Sg(gkClaimPool,p.claim90)*.50+Sg(gkAerRatePool,p.aerWonRate)*.30+gcInv*.20
        :Sg(gkPrs,p.prs90)*.40+Sg(gkArl,p.arl90)*.40+gcInv*.20;

        :Sg(gkArl,p.arl90)*.50+Sg(v("intc90"),p.intc90)*.50;

        ?Sg(gkCs,p.csRate)*.40+Sg(gkSvMlsPool,p.svMls90)*.60
        :Sg(gkCs,p.csRate)*.50+Sg(gkSv,p.sv90)*.50;

      const gkOv=shotStop*.35+command*.25+dist*.20+sweep*.10+handling*.10;
      gkComposites.push({id:p.id,ov:gkOv,shotStop,dist,command,sweep,handling});
    } else {
      // ── OUTFIELD GRADING ──
      // [OPT1] Sub-grades use LEAGUE-WIDE outfield pools (universal). Position
      // only drives the Overall weighting + the Overall rank pool (pass 2).
      const pos=p.pos||"Midfielder";
      const isFW=pos==="Forward"||pos==="FW";
      const isDF=pos==="Defender"||pos==="DF"||pos==="DEF";
      const n90s=p.n90s||6.7;const S=(pool,val)=>pct(pool,((val||0)*n90s+mn(pool)*K90S)/(n90s+K90S));

      // Sub-grades: universal (ranked against all outfielders)
      const att=S(ofOxg,p.oxg90)*.40+S(ofXg,p.xg90)*.20+S(ofChc,p.chc90)*.25+S(ofXa,p.xa90)*.15;
      const pas=S(ofPc,p.pc)*.25+S(ofPassPerf,p.passPerfV)*.20+S(ofPg,p.pga)*.15+S(ofFtp,p.ftp90)*.15+S(ofKp,p.kp90)*.15+S(ofPresR,p.presRV)*.10;
      const def=S(ofDf,p.dga)*.25+S(ofPrs,p.prs90)*.20+S(ofIntc,p.intc90)*.15+S(ofArl,p.arl90)*.15+S(ofClr,p.clr90)*.15+S(ofArlPct,p.arlPctV)*.10;/*GRADEENGINE*/
      const cre=S(ofKp,p.kp90)*.40+S(ofXa,p.xa90)*.25+S(ofChc,p.chc90)*.20+S(ofSca,p.sca90)*.15;
      const car=S(ofGdr,p.gdrV)*.35+S(ofEsc,p.escV)*.20+S(ofPrgc,p.prgc90)*.15+S(ofDrb,p.drb90)*.10+S(ofFtp,p.ftp90)*.10+S(ofFls,p.flSuf90)*.10;
      const gaP=S(ofGa,p.tga);

      // Position-weighted Overall (weights unchanged)
      let ov;
      if(isFW){
        ov=att*.30+cre*.20+gaP*.25+car*.10+pas*.10+def*.05;
      }else if(isDF){
        ov=def*.30+gaP*.25+pas*.20+car*.10+cre*.10+att*.05;
      }else{
        ov=gaP*.20+pas*.20+cre*.20+att*.15+def*.15+car*.10;

  // ── GK PASS 2: rank-rescale ──
  // Convert each GK's composite + sub-grades to rank within GK pool, then

  }

/*TRADE-MACHINE*/
// ── MLS Trade Machine rules engine (Path A: slot + budget-charge compliance) ──
// 2026 constants. [V]=verified Feb 2026, [C]=confirm. UPDATE EACH FEBRUARY.
const TM_RULES={MAX_SALARY_BUDGET_CHARGE:803125,MIDSEASON_DP_CHARGE:401563,TAM_CEILING:1803125,SENIOR_SALARY_BUDGET:6425000/*PATHB*/,GAM_ALLOTMENT:3280000,DISCRETIONARY_TAM:2125000,MAX_DP:3,MAX_U22:4,MAX_INTERNATIONAL:8,SENIOR_ROSTER_MAX:20,TOTAL_ROSTER_MAX:30};
// Per-club available General Allocation Money (MLS published, as of Feb 20 2026, post Roster Compliance).
// GAM buys down Salary Budget Charges $1-for-$1. UPDATE from the latest MLS GAM
// release / Club Roster Profiles when republished (a few times per season).
const TM_GAM={ATL:344356,ATX:412817,CLT:75994,CHI:1003353,CIN:361337,COL:5007225,CLB:952447,DAL:1576731,DC:2137599,HOU:2310805,SKC:6380121,LA:0,LAFC:249749,MIA:17361,MIN:4157930,MTL:3247472,NSH:1581229,NE:1162968,NYC:2637519,ORL:655360,PHI:4393417,POR:4788001,RSL:4435148,RBNY:189830,SD:4211327,SJ:4725751,SEA:243090,STL:2227157,TOR:3078603,VAN:20945};
const tmNum=v=>(typeof v==="number"&&isFinite(v)?v:0);
function tmCounts(p){if(p.isLoanedOut)return false;const c=p.rosterCategory||"";return c==="Senior"||c.indexOf("Supplemental")===0;}
function tmSenior(p){return !p.isLoanedOut&&(p.rosterCategory||"")==="Senior";}
function tmCharge(p,K){return p.isDP?K.MAX_SALARY_BUDGET_CHARGE:Math.min(tmNum(p.salary),K.MAX_SALARY_BUDGET_CHARGE);/*TAMNET*/}
function tmSummarize(roster,K){K=K||TM_RULES;const cc=roster.filter(tmCounts),sr=roster.filter(tmSenior);const s={size:cc.length,seniorSize:sr.length,offRoster:roster.length-cc.length,dp:0,u22:0,intl:0,hg:0,budgetCharge:0,missingSalary:0,totalGrade:0,gradedCount:0};for(const p of cc){if(p.isDP)s.dp++;if(p.isU22)s.u22++;if(p.isInternational)s.intl++;if(p.isHomegrown)s.hg++;if(typeof p.overall==="number"){s.totalGrade+=p.overall;s.gradedCount++;}}for(const p of sr){const sal=tmNum(p.salary);if(!p.isDP&&sal===0)s.missingSalary++;s.budgetCharge+=tmCharge(p,K);}s.avgGrade=s.gradedCount?+(s.totalGrade/s.gradedCount).toFixed(1):0;return s;}
function tmCheck(after,prev,K,gam,intlMax){K=K||TM_RULES;const violations=[],warnings=[];const iMax=(typeof intlMax==="number")?intlMax:K.MAX_INTERNATIONAL;if(after.dp>K.MAX_DP){if(prev.dp>K.MAX_DP&&after.dp>=prev.dp)warnings.push("Already shows "+prev.dp+" DPs in source data (MLS max "+K.MAX_DP+"; likely a roster-feed quirk). Trade doesn't reduce it.");else violations.push(after.dp+" Designated Players \u2014 exceeds max of "+K.MAX_DP+". Buy one down with GAM/TAM or include them in the trade.");}if(after.u22>K.MAX_U22)warnings.push(after.u22+" U22 Initiative players (typical max "+K.MAX_U22+") \u2014 verify against the club's declared model.");if(after.intl>iMax)warnings.push(after.intl+" international players \u2014 over "+iMax+" slots"+(iMax!==K.MAX_INTERNATIONAL?" (after traded slots)":"")+"; needs extra (tradeable) international spots.");if(after.size>K.TOTAL_ROSTER_MAX)violations.push(after.size+" players \u2014 exceeds roster limit of "+K.TOTAL_ROSTER_MAX+".");const over=after.budgetCharge-K.SENIOR_SALARY_BUDGET;if(after.missingSalary>0)warnings.push("Budget approximate: "+after.missingSalary+" senior player(s) missing salary data.");if(over>0){const haveGam=(typeof gam==="number");const pool=haveGam?gam:(K.GAM_ALLOTMENT+K.DISCRETIONARY_TAM);if(over>pool){const prevOver=prev.budgetCharge-K.SENIOR_SALARY_BUDGET;/*VERDICTFIX*/
if(prevOver>pool){warnings.push("Already $"+(prevOver/1e6).toFixed(2)+"M over budget before any trade \u2014 a charge-model artifact (real clubs must be compliant)"+(after.budgetCharge>prev.budgetCharge+1000?"; note this trade adds $"+((after.budgetCharge-prev.budgetCharge)/1e6).toFixed(2)+"M to it":"; trade doesn't worsen it")+".");}
else{violations.push("Charge $"+(after.budgetCharge/1e6).toFixed(2)+"M is $"+(over/1e6).toFixed(2)+"M over the $"+(K.SENIOR_SALARY_BUDGET/1e6).toFixed(2)+"M budget \u2014 more than the club's "+(haveGam?"$"+(pool/1e6).toFixed(2)+"M available GAM":"allocation money")+" can buy down"+(prevOver>0?" (and the club was already $"+(prevOver/1e6).toFixed(2)+"M over)":"")+".");}}else{warnings.push("$"+(over/1e6).toFixed(2)+"M over budget \u2014 covered by buying down with the club's "+(haveGam?"$"+(pool/1e6).toFixed(2)+"M available GAM (leaves $"+((pool-over)/1e6).toFixed(2)+"M)":"GAM/TAM")+".");}}return{violations,warnings,intlMax:iMax};}
function tmEvaluate(o){const K=o.K||TM_RULES;const idOf=p=>p.id||p.sportecId||p.name;const oa=new Set(o.outA.map(idOf)),ob=new Set(o.outB.map(idOf));const afterA=o.rosterA.filter(p=>!oa.has(idOf(p))).concat(o.outB);const afterB=o.rosterB.filter(p=>!ob.has(idOf(p))).concat(o.outA);const bA=tmSummarize(o.rosterA,K),aA=tmSummarize(afterA,K),bB=tmSummarize(o.rosterB,K),aB=tmSummarize(afterB,K);const astA=o.assetA||{gam:0,intl:0,picks:0},astB=o.assetB||{gam:0,intl:0,picks:0};
const baseGamA=TM_GAM[o.nameA],baseGamB=TM_GAM[o.nameB];
const gamA=(typeof baseGamA==="number")?baseGamA-(astA.gam||0)+(astB.gam||0):undefined;
const gamB=(typeof baseGamB==="number")?baseGamB-(astB.gam||0)+(astA.gam||0):undefined;
const iMaxA=K.MAX_INTERNATIONAL-(astA.intl||0)+(astB.intl||0);
const iMaxB=K.MAX_INTERNATIONAL-(astB.intl||0)+(astA.intl||0);
const cA=tmCheck(aA,bA,K,gamA,iMaxA),cB=tmCheck(aB,bB,K,gamB,iMaxB);
if((astA.gam||0)>0&&typeof baseGamA==="number"&&astA.gam>baseGamA)cA.violations.push("Sending $"+(astA.gam/1e6).toFixed(2)+"M GAM but the club only has $"+(baseGamA/1e6).toFixed(2)+"M available.");
if((astB.gam||0)>0&&typeof baseGamB==="number"&&astB.gam>baseGamB)cB.violations.push("Sending $"+(astB.gam/1e6).toFixed(2)+"M GAM but the club only has $"+(baseGamB/1e6).toFixed(2)+"M available.");const sum=(arr,f)=>arr.reduce((t,p)=>t+f(p),0);const gO=sum(o.outA,p=>tmNum(p.overall)),gI=sum(o.outB,p=>tmNum(p.overall));const sO=sum(o.outA,p=>tmNum(p.salary)),sI=sum(o.outB,p=>tmNum(p.salary));const gamDelta=(astB.gam||0)-(astA.gam||0),picksDelta=(astB.picks||0)-(astA.picks||0);
const gv=(gI-gO)+(gamDelta+picksDelta*100000)/250000;
const fairness={gradeDelta:+(gI-gO).toFixed(1),salaryDelta:sI-sO,gamDelta,picksDelta,verdict:Math.abs(gv)<=8?"balanced":(gv>0?"favors "+(o.nameA||"Team A"):"favors "+(o.nameB||"Team B"))};return{legal:cA.violations.length===0&&cB.violations.length===0,teamA:{before:bA,after:aA,constants:K,violations:cA.violations,warnings:cA.warnings,intlMax:cA.intlMax},teamB:{before:bB,after:aB,constants:K,violations:cB.violations,warnings:cB.warnings,intlMax:cB.intlMax},fairness};}

function tmPos(p){const z=String(p.position||'').toLowerCase();if(z.includes('keep')||z==='gk')return 'GK';if(z.includes('back')||z.includes('def'))return 'D';if(z.includes('mid'))return 'M';return 'F';}
function tmScoreSet(gOut,sOut,outPos,set){/*MULTI*/
  const num=tmNum;
  const gC=set.reduce((t,p)=>t+num(p.overall),0), sC=set.reduce((t,p)=>t+num(p.salary),0);
  const gDiff=Math.abs(gOut-gC), sDiff=Math.abs(sOut-sC)/Math.max(sOut,sC,500000);
  const gScore=Math.max(0,1-gDiff/25), sScore=Math.max(0,1-sDiff);
  const posBonus=set.some(p=>outPos.has(tmPos(p)))?5:0;
  return Math.round((gScore*0.6+sScore*0.4)*95+posBonus);
}
function tmSuggestReturns(o){/*TRADE-SUGGEST*/
  const K=o.K||TM_RULES, num=tmNum;
  const gOut=o.outA.reduce((t,p)=>t+num(p.overall),0);
  const sOut=o.outA.reduce((t,p)=>t+num(p.salary),0);
  const outPos=new Set(o.outA.map(tmPos));
  const exIds=new Set([...(o.exclude||[]),...o.outA].map(p=>p.id));
  const cands=o.rosterB.filter(p=>p.rated&&tmCounts(p)&&!exIds.has(p.id));
  const single=cands.map(p=>({set:[p],score:tmScoreSet(gOut,sOut,outPos,[p])})).sort((a,b)=>b.score-a.score).slice(0,5);
  let entries=single;
  // Fallback: best single is a weak match -> search 2-player packages from the top pool
  if(single.length && single[0].score<60){
    const top=cands.slice().sort((a,b)=>num(b.overall)-num(a.overall)).slice(0,15);
    let best=null;
    for(let i=0;i<top.length;i++)for(let j=i+1;j<top.length;j++){
      const sc=tmScoreSet(gOut,sOut,outPos,[top[i],top[j]]);
      if(!best||sc>best.score)best={set:[top[i],top[j]],score:sc};
    }
    if(best && best.score>single[0].score) entries=[best,...single.slice(0,4)];
  }
  return entries.map(e=>{
    const ev=tmEvaluate({rosterA:o.rosterA,rosterB:o.rosterB,outA:o.outA,outB:e.set,nameA:o.nameA,nameB:o.nameB});
    return {players:e.set,score:e.score,legal:ev.legal};
  });
}

  if(logo)return <img src={logo} alt={abbr} style={{width:size,height:size,objectFit:"contain",flexShrink:0}} onError={e=>{e.target.onerror=null;e.target.style.display="none"}}/>;
  const t=tcm[abbr];

function Badge({grade,size="sm",rated=true}){/*NR*/
  const fs=size==="lg"?36:size==="md"?17:14;
  const pad=size==="lg"?"12px 20px":size==="md"?"4px 10px":"2px 7px";
  if(rated===false||grade==null){
    return <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",background:T.borderLt,border:`1.5px solid ${T.textMute}30`,borderRadius:size==="lg"?10:5,padding:pad,minWidth:size==="lg"?72:size==="md"?36:34}}>
      <span style={{color:T.textMute,fontWeight:700,fontSize:size==="lg"?20:fs,fontFamily:T.serif,letterSpacing:0,lineHeight:1}}>NR</span>
      {size==="lg"&&<span style={{color:T.textMute,fontSize:7,fontWeight:600,letterSpacing:1,opacity:.8,marginTop:2,fontFamily:T.sans,textTransform:"uppercase"}}>Not Rated</span>}
    </div>;
  }
  return <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",background:gb(grade),border:`1.5px solid ${gc(grade)}30`,borderRadius:size==="lg"?10:5,padding:pad,minWidth:size==="lg"?72:size==="md"?36:34}}>
    <span style={{color:gc(grade),fontWeight:700,fontSize:fs,fontFamily:T.serif,letterSpacing:-.5,lineHeight:1}}>{size==="lg"?(+grade).toFixed(1):Math.round(grade)}</span>

  </div>;
}

function RadarChart({grades,size=170}){
  const cats=[{k:"attack",l:"ATT"},{k:"creativity",l:"CRE"},{k:"passing",l:"PAS"},{k:"defense",l:"DEF"},{k:"carrying",l:"CAR"},{k:"overall",l:"OVR"}];
  const cx=size/2,cy=size/2,r=size*.36;
  const pt=(i,pct)=>{const ang=((Math.PI*2)/cats.length)*i-Math.PI/2;return[cx+r*pct*Math.cos(ang),cy+r*pct*Math.sin(ang)];};
  const rings=[.25,.5,.75,1];
  const vals=cats.map(c=>Math.min(1,(grades[c.k]||50)/99));
  const poly=vals.map((v,i)=>pt(i,v).join(",")).join(" ");
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    {rings.map(rv=><polygon key={rv} points={cats.map((_,i)=>pt(i,rv).join(",")).join(" ")} fill="none" stroke={T.borderLt} strokeWidth={rv===1?1.5:.5}/>)}
    {cats.map((_,i)=>{const[x,y]=pt(i,1);return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke={T.borderLt} strokeWidth=".5"/>;})}
    <polygon points={poly} fill="#1A1A1A12" stroke={T.ink} strokeWidth="1.8" strokeLinejoin="round"/>
    {vals.map((v,i)=>{const[x,y]=pt(i,v);return <circle key={i} cx={x} cy={y} r="3" fill={gc(grades[cats[i].k]||50)} stroke="#fff" strokeWidth="1"/>;})}
    {cats.map((c,i)=>{const[x,y]=pt(i,1.22);const g=grades[c.k]||50;return <text key={c.k} x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fontSize="8" fontFamily="Inter,sans-serif" fontWeight="700" fill={gc(g)}>{c.l} {g}</text>;})}
  </svg>;
}

function PctBadge({value}){
  const c=value>=90?"#B68D40":value>=75?T.green:value>=50?T.blue:value>=25?T.textDim:T.red;
  return <span style={{fontSize:10,fontFamily:T.mono,fontWeight:700,color:c,background:`${c}12`,padding:"2px 6px",borderRadius:0,marginLeft:4}}>{value}th</span>;
}

// Form sparkline — within-season form curve
function FormSparkline({data,width=200,height=50}){
  if(!data||data.length<2)return null;
  const grades=data.map(d=>d.grade);
  const latest=grades[grades.length-1];
  return <div style={{position:"relative"}}>
    <ResponsiveContainer width="100%" height={height}>
      <AreaChart data={data} margin={{top:4,right:4,bottom:0,left:4}}>
        <defs>
          <linearGradient id="formGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={gc(latest)} stopOpacity={0.25}/>
            <stop offset="100%" stopColor={gc(latest)} stopOpacity={0.02}/>
          </linearGradient>
        </defs>
        <Area type="monotone" dataKey="grade" stroke={gc(latest)} strokeWidth={2} fill="url(#formGrad)" dot={false} isAnimationActive={false}/>
      </AreaChart>
    </ResponsiveContainer>
  </div>;
}

// Mini inline sparkline for table rows — pure SVG, no Recharts
function MiniSparkline({matchLog,w=40,h=14}){
  if(!matchLog||matchLog.length<2)return null;
  const last5=matchLog.slice(-5);
  const rates=last5.map(m=>{let r=55;r+=(m.g||0)*12;r+=(m.a||0)*8;r+=(m.sot||0)*2;r+=(m.sh||0)*.5;r-=(m.fl||0)*1;r-=(m.yc||0)*3;r-=(m.rc||0)*10;r+=(m.mins||0)>=80?3:1;return Math.max(42,Math.min(99,Math.round(r)));});
  const mn=Math.min(...rates),mx=Math.max(...rates),rng=mx-mn||1;
  const pts=rates.map((v,i)=>[i*(w/(rates.length-1)),h-2-((v-mn)/rng)*(h-4)]);
  const d="M"+pts.map(p=>p.join(",")).join("L");
  const latest=rates[rates.length-1];
  const col=gc(latest);
  return <svg width={w} height={h} style={{display:"block",flexShrink:0}}><path d={d} fill="none" stroke={col} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round"/><circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r={2} fill={col}/></svg>;
}

function SeasonSparkline({seasons,width=180,height=60}){
  if(!seasons||seasons.length<1)return <span style={{fontSize:9,color:T.textMute,fontFamily:T.sans,fontStyle:"italic"}}>No history</span>;
  return <div>
    <ResponsiveContainer width="100%" height={height}>
      <LineChart data={seasons} margin={{top:8,right:12,bottom:4,left:12}}>
        <XAxis dataKey="year" tick={{fontSize:9,fill:T.textMute,fontFamily:"Inter,sans-serif"}} axisLine={false} tickLine={false}/>
        <Line type="monotone" dataKey="overall" stroke={T.ink} strokeWidth={2.5} dot={{r:4,fill:T.ink,stroke:T.bg,strokeWidth:2}} isAnimationActive={false}/>
      </LineChart>
    </ResponsiveContainer>
    <div style={{display:"flex",justifyContent:"center",gap:12,marginTop:2}}>
      {seasons.map(s=><span key={s.year} style={{fontFamily:T.mono,fontSize:10,fontWeight:700,color:gc(s.overall)}}>{s.overall}</span>)}
    </div>
  </div>;
}

// Tiny inline SVG sparkline for table rows (no Recharts overhead)
function MiniSpark({data,width=60,height=20,color}){
  if(!data||data.length<2)return null;
  const vals=data.map(d=>d.grade);
  const mn=Math.min(...vals)-3,mx=Math.max(...vals)+3,range=mx-mn||1;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1))*width},${height-((v-mn)/range)*height}`).join(" ");
  return <svg width={width} height={height} style={{display:"block"}}>
    <polyline points={pts} fill="none" stroke={color||T.ink} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity=".7"/>
    <circle cx={width} cy={height-((vals[vals.length-1]-mn)/range)*height} r="2" fill={color||T.ink}/>
  </svg>;
}

// Top 3 podium
function TopCards({players,metric,metricLabel,onSelect}){
  const top3=players.slice(0,3);if(!top3.length)return null;
  return <div className="resp-grid3" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:24}}>
    {top3.map((p,i)=>(
      <div key={p.id} onClick={()=>onSelect(p)} style={{
        background:T.surface,border:`1px solid ${i===0?T.ink+"20":T.border}`,borderRadius:0,padding:"16px",
        cursor:"pointer",transition:"box-shadow .2s",boxShadow:i===0?"0 2px 8px rgba(0,0,0,.08)":"none",
      }} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,.1)"} onMouseLeave={e=>e.currentTarget.style.boxShadow=i===0?"0 2px 8px rgba(0,0,0,.08)":"none"}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontFamily:T.serif,fontWeight:700,fontSize:18,color:i===0?T.accent:T.textMute}}>{i+1}</span>
          <TeamBadge abbr={p.team} size={36} logo={p.teamLogo}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:T.serif,fontWeight:700,fontSize:17,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</div>

          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div><div style={{fontFamily:T.display,fontWeight:700,fontSize:30,color:T.ink,lineHeight:1}}>{metric(p)}</div><div style={{fontSize:8,color:T.textMute,fontWeight:600,letterSpacing:1.5,marginTop:3,fontFamily:T.sans}}>{metricLabel}</div></div>
          <Badge grade={p.overall} rated={p.rated} size="md"/>
        </div>
      </div>
    ))}
  </div>;
}

// ─── PLAYER MODAL ────────────────────────────────────────────────────────────

              <span style={{color:T.border}}>|</span><span>{p.age?`${p.age} yrs`:"—"}</span>
              <span style={{color:T.border}}>|</span><span>{p.heightCm?`${Math.floor(p.heightCm/2.54/12)}'${Math.round(p.heightCm/2.54%12)}"`:"—"}</span>
              <span style={{color:T.border}}>|</span><span>{p.weightKg?`${Math.round(p.weightKg*2.205)} lbs`:"—"}</span>
              <span style={{color:T.border}}>|</span><span>{p.mins?.toLocaleString()} min</span>
            </div>
          </div>
          <Badge grade={p.overall} rated={p.rated} size="lg"/>
        </div>
      </div>

      {/* Grade strip */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",borderBottom:`1px solid ${T.border}`}}>

            {[{l:"Overall",k:"overall"},{l:"Attack",k:"attack"},{l:"Passing",k:"passing"},{l:"Defense",k:"defense"},{l:"Creativity",k:"creativity"},{l:"Carrying",k:"carrying"},{l:"Goals",k:"goals"},{l:"Assists",k:"assists"},{l:"Clearances",k:"clearances"},{l:"Key Passes",k:"keyPasses"},{l:"Dribbles",k:"dribbles"},{l:"Pressures",k:"pressures"}].map(s=>{

                {[{l:"OVR",v:s.overall},{l:"ATT",v:s.attack},{l:"PAS",v:s.passing},{l:"DEF",v:s.defense},{l:"CRE",v:s.creativity},{l:"CAR",v:s.carrying}].map(g=>(

          {onCompare&&<button onClick={()=>{onCompare(p);onClose();}} disabled={isInCompare} style={{background:isInCompare?"transparent":T.bg,border:`1px solid ${isInCompare?T.borderLt:T.accent}`,color:isInCompare?T.textMute:T.accent,padding:"7px 16px",borderRadius:0,cursor:isInCompare?"default":"pointer",fontFamily:T.sans,fontWeight:600,fontSize:11,opacity:isInCompare?.5:1}}>{isInCompare?"In Compare":"+ Compare"}</button>}
          <button onClick={onClose} style={{background:T.ink,border:"none",color:T.bg,padding:"7px 20px",borderRadius:0,cursor:"pointer",fontFamily:T.sans,fontWeight:600,fontSize:11,letterSpacing:.5}}>Close</button>
        </div>
      </div>
    </div>
  </div>;
}



// ─── SEARCH ──────────────────────────────────────────────────────────────────
function PlayerSearch({players,onSelect}){
  const[q,setQ]=useState("");const[open,setOpen]=useState(false);const ref=useRef(null);
  useEffect(()=>{const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);},[]);
  const res=useMemo(()=>q.length<2?[]:players.filter(p=>p.name?.toLowerCase().includes(q.toLowerCase())||p.team?.toLowerCase().includes(q.toLowerCase())).slice(0,8),[q,players]);
  return <div ref={ref} style={{position:"relative",width:"100%",maxWidth:240}}>
    <input value={q} onChange={e=>{setQ(e.target.value);setOpen(true);}} placeholder="Search players..." onFocus={()=>setOpen(true)} style={{width:"100%",padding:"8px 12px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:0,color:T.text,fontSize:13,fontFamily:T.sans,outline:"none"}}/>
    {open&&res.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:T.surface,border:`1px solid ${T.border}`,borderTop:"none",borderBottomLeftRadius:6,borderBottomRightRadius:6,zIndex:500,maxHeight:320,overflowY:"auto",boxShadow:"0 12px 32px rgba(0,0,0,.12)"}}>
      {res.map((p,i)=><div key={p.id} onClick={()=>{onSelect(p);setQ("");setOpen(false);}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderTop:i?`1px solid ${T.borderLt}`:"none",cursor:"pointer",transition:"background .1s"}} onMouseEnter={e=>e.currentTarget.style.background=T.card} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
        <TeamBadge abbr={p.team} size={36} logo={p.teamLogo}/><div style={{flex:1,minWidth:0}}><div style={{fontFamily:T.serif,fontWeight:600,fontSize:12,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:T.ink}}>{p.name}</div><div style={{fontSize:9,color:T.textDim,fontFamily:T.sans}}>{p.position} · {p.teamName}</div></div><Badge grade={p.overall} rated={p.rated} size="sm"/>
      </div>)}
    </div>}
  </div>;
}

  function genFormCurve(p,points=10){
    const log=p.matchLog||[];
    // REAL DATA PATH: if player has match-level data, compute per-game ratings
    if(log.length>=2){
      return log.map((m,i)=>{
        // Per-game rating: base 55 + contributions from goals, assists, shots, clean behavior
        let rating=55;
        rating+=(m.g||0)*12; // goals are huge
        rating+=(m.a||0)*8;  // assists
        rating+=(m.sot||0)*2; // shots on target
        rating+=(m.sh||0)*0.5; // shots
        rating-=(m.fl||0)*1; // fouls hurt
        rating-=(m.yc||0)*3; // yellow cards
        rating-=(m.rc||0)*10; // red cards
        // Minutes bonus: full 90 = +3, sub appearance = +1
        rating+=(m.mins||0)>=80?3:(m.mins||0)>=45?2:1;
        // Clamp
        rating=Math.round(Math.max(42,Math.min(99,rating)));
        const dt=m.date?new Date(m.date):null;
        const label=dt?`${dt.getMonth()+1}/${dt.getDate()}`:`GW${i+1}`;
        return{match:i+1,grade:rating,label,date:m.date,opp:m.opp||"?",ha:m.ha||"",g:m.g||0,a:m.a||0,mins:m.mins||0};
      });
    }
    // SIMULATED PATH: deterministic curve from season totals (legacy fallback)
    const seed=(p.name||"X").split("").reduce((s,c)=>((s*31)+c.charCodeAt(0))|0,0);
    const rng=(i)=>{let x=Math.abs((seed*13+i*997)%10000)/10000;return x;};
    const base=p.overall||55;
    const ga=parseFloat(p.totalGA)||0;
    const consistency=p.consistency||70;
    const variance=Math.max(3,(100-consistency)*0.25);
    const trendSlope=ga>2?0.8:ga>0?0.3:ga<-1?-0.6:ga<0?-0.2:0;
    const curve=[];
    for(let i=0;i<points;i++){
      const t=i/(points-1);
      const trendOffset=trendSlope*(t-0.5)*8;
      const noise=(rng(i)-0.5)*variance*2;
      const v=Math.round(Math.max(42,Math.min(99,base+trendOffset+noise)));
      curve.push({match:i+1,grade:v,label:`MW${i+1}`});
    }
    return curve;

    return cats.map(c=>{let pool=[...players].filter(p=>parseFloat(p[c.k])>0);if(c.minField)pool=pool.filter(p=>(parseFloat(p[c.minField])||0)>=c.minVal);const sorted=pool.sort((a,b)=>(parseFloat(b[c.k])||0)-(parseFloat(a[c.k])||0));return{...c,top:sorted.slice(0,5)};}).filter(c=>c.top.length>0);
  },[players]);

  // Power Rankings — simulated previous week via deterministic offset per team
  const powerRankings=useMemo(()=>{
    if(!enrichedTeams.length||enrichedTeams[0].count===0)return[];
    const current=enrichedTeams.map((t,i)=>({...t,rank:i+1}));
    // Simulate previous ranks: hash team abbr for a consistent offset
    const hash=(s)=>s.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
    const prev=current.map(t=>{const off=((hash(t.abbr)*7+3)%9)-4;return{abbr:t.abbr,prevRank:Math.max(1,Math.min(30,t.rank+off))};});
    // Resolve ties — shuffle duplicates
    const used=new Set();const resolved=[];
    prev.sort((a,b)=>a.prevRank-b.prevRank).forEach(p=>{let r=p.prevRank;while(used.has(r))r++;used.add(r);resolved.push({abbr:p.abbr,prevRank:r});});
    const prevMap={};resolved.forEach(r=>{prevMap[r.abbr]=r.prevRank;});

    // Generate a short blurb per team
    const blurb=(t)=>{
      const parts=[];
      if(t.attack>=78)parts.push("elite attacking output");
      else if(t.attack<=55)parts.push("struggling in front of goal");
      if(t.defense>=78)parts.push("rock-solid defensive unit");
      else if(t.defense<=55)parts.push("leaky at the back");
      if(t.creativity>=78)parts.push("creative playmaking");
      if(t.carrying>=78)parts.push("strong ball progression");
      if(t.topScorer&&t.topScorer.goals>=8)parts.push(`${t.topScorer.name} leading with ${t.topScorer.goals} goals`);
      if(!parts.length)parts.push("solid all-around performance");
      return parts.slice(0,2).join(". ")+".";
    };

    return current.map(t=>{
      const prev=prevMap[t.abbr]||t.rank;
      const move=prev-t.rank;
      return{...t,prevRank:prev,move,blurb:blurb(t)};
    });
  },[enrichedTeams]);

  const TABS=[{id:"front",l:"Front Page"},{id:"players",l:"Player Grades"},{id:"season",l:"Season Rating"},{id:"defense",l:"Defense"},{id:"passing",l:"Passing"},{id:"teams",l:"Teams"},{id:"rankings",l:"Table"},{id:"leaders",l:"Leaders"},{id:"valuations",l:"Values"},{id:"positions",l:"Positional"},{id:"compare",l:"Compare"+(comparePlayers.length?` (${comparePlayers.length})`:"")},{id:"trade",l:"Trade Machine"}];

              {!isMobile&&<div style={{fontSize:14,color:T.textDim,fontFamily:T.mono,background:hm(+p.passComp,100),borderRadius:0,textAlign:"center",padding:"2px 0"}}>{p.passComp}%</div>}
              {!isMobile&&<div style={{fontSize:15,color:T.ink,fontWeight:600,background:hm(p.clearances,40),borderRadius:0,textAlign:"center",padding:"2px 0"}}>{sv(p.clearances)}</div>}
              {!isMobile&&<div style={{fontSize:13,color:T.textDim,textAlign:"center"}}>{p.shots!=null?`${p.shots}/${p.shotsOnTarget}`:"—"}</div>}
              {!isMobile&&<div style={{fontSize:13,color:T.textDim,textAlign:"center"}}>{sv(p.fouls)}</div>}
              <div style={{fontSize:isMobile?11:14,color:+p.totalGA>=0?T.green:T.red,fontWeight:700,fontFamily:T.mono,background:hm(Math.abs(+p.totalGA),5),borderRadius:0,textAlign:"center",padding:"2px 0"}}>{+p.totalGA>=0?"+":""}{p.totalGA}</div>
            </div>)}
          </div></TableWrap>
        </div>}

        {/* ═══ SEASON RATING ═══════════════════════════════════════════════ */}
        {!loading&&tab==="season"&&(()=>{
          const toggleSrSort=(k)=>{if(srSort===k)setSrDir(d=>d==="desc"?"asc":"desc");else{setSrSort(k);setSrDir(k==="age"||k==="valueEff"?"asc":"desc");}};

          const{ratings,byPos,tiers}=seasonRatings;
          const srFiltered=ratings.filter(p=>{
            if(srPosFilter!=="All"){const map={Forward:["FW"],Midfielder:["MF"],Defender:["DF"],GK:["GK"]};if(!map[srPosFilter]?.includes(p.posGroup))return false;}
            if(srTeamFilter!=="All"&&p.team!==srTeamFilter)return false;
            if((p.mins||0)<srMinMins)return false;
            return true;
          }).sort((a,b)=>{
            const dir=srDir==="asc"?1:-1;
            if(srSort==="age")return dir*(parseFloat(a.age||99)-parseFloat(b.age||99));
            if(srSort==="name")return dir*(a.name||"").localeCompare(b.name||"");
            return dir*((parseFloat(a[srSort])||0)-(parseFloat(b[srSort])||0));
          });

          const formIcon=(t)=>t==="up"?"▲":t==="down"?"▼":"—";
          const formColor=(t)=>t==="up"?T.green:t==="down"?T.red:T.textMute;
          const profileColor=(p)=>p==="Offensive"?T.accent:p==="Defensive"?T.blue:T.textDim;
          const profileIcon=(p)=>p==="Offensive"?"⚔":"Defensive"?"🛡":"⚖";

          // Top 3 season rated
          const top3=srFiltered.slice(0,3);

          // Stats summary (based on filtered)
          const avgSR=srFiltered.length?Math.round(srFiltered.reduce((s,p)=>s+p.seasonGrade,0)/srFiltered.length):0;
          const eliteCount=srFiltered.filter(p=>p.seasonGrade>=85).length;
          const avgConsistency=srFiltered.length?Math.round(srFiltered.reduce((s,p)=>s+p.consistency,0)/srFiltered.length):0;

          return <div style={{animation:"fadeUp .4s ease"}}>
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:20,flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontFamily:T.display,fontWeight:700,fontSize:26,color:T.ink,letterSpacing:-.5}}>Season Rating</div>
                <div style={{fontSize:12,color:T.textMute,fontFamily:T.sans,marginTop:4}}>Cumulative season performance — unlike Player Grades (a per-90 snapshot), this rewards durability, goal involvement, and Goals Added over a full season. · {srFiltered.length} players shown</div>
              </div>
              <div style={{display:"flex",gap:6}}>
                {["table","position","tiers"].map(v=><button key={v} onClick={()=>setSrView(v)} style={{background:srView===v?T.ink:"transparent",color:srView===v?T.bg:T.textDim,border:`1px solid ${srView===v?T.ink:T.border}`,borderRadius:0,padding:"5px 14px",cursor:"pointer",fontFamily:T.sans,fontWeight:600,fontSize:10,letterSpacing:.5,textTransform:"uppercase"}}>{v==="table"?"Table":v==="position"?"By Position":"Tiers"}</button>)}
              </div>
            </div>

            {/* Summary cards */}
            <div className="resp-grid4" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
              {[
                {v:srFiltered.length,l:"Players",sub:srMinMins>0?`${srMinMins}+ min`:"All minutes"},
                {v:avgSR,l:"Avg Rating",sub:gl(avgSR),c:gc(avgSR)},
                {v:eliteCount,l:"Elite Rated",sub:"85+ grade",c:T.gold},
                {v:`${avgConsistency}%`,l:"Avg Consistency",sub:"Cross-category",c:avgConsistency>=70?T.green:T.textDim},
              ].map(s=>(
                <div key={s.l} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:0,padding:"10px 8px",textAlign:"center"}}>
                  <div style={{fontFamily:T.display,fontWeight:700,fontSize:20,color:s.c||T.ink,lineHeight:1}}>{s.v}</div>
                  <div style={{fontSize:8,color:T.textMute,fontWeight:600,letterSpacing:.5,marginTop:3,fontFamily:T.sans,textTransform:"uppercase"}}>{s.l}</div>
                </div>
              ))}
            </div>

            {/* What Changed — Biggest Movers */}
            {(()=>{
              const movers=filtered.filter(p=>{
                const pl=players.find(x=>x.id===p.id);
                return pl&&pl.matchLog&&pl.matchLog.length>=3;
              }).map(p=>{
                const pl=players.find(x=>x.id===p.id);
                const logs=pl.matchLog;
                const rateGame=(m)=>{let r=55;r+=(m.g||0)*12;r+=(m.a||0)*8;r+=(m.sot||0)*2;r+=(m.sh||0)*.5;r-=(m.fl||0)*1;r-=(m.yc||0)*3;r-=(m.rc||0)*10;r+=(m.mins||0)>=80?3:1;return Math.max(42,Math.min(99,Math.round(r)));};
                const allRatings=logs.map(rateGame);
                const recent=allRatings.slice(-2);
                const prior=allRatings.slice(0,-2);
                if(prior.length<1)return null;
                const recentAvg=Math.round(recent.reduce((s,v)=>s+v,0)/recent.length);
                const priorAvg=Math.round(prior.reduce((s,v)=>s+v,0)/prior.length);
                const delta=recentAvg-priorAvg;
                // What context? Goals/assists in recent games
                const recentLogs=logs.slice(-2);
                const recentG=recentLogs.reduce((s,m)=>s+(m.g||0),0);
                const recentA=recentLogs.reduce((s,m)=>s+(m.a||0),0);
                let context="";
                if(recentG>0)context+=`${recentG}G `;
                if(recentA>0)context+=`${recentA}A `;
                if(!context&&delta>0)context="Strong all-around ";
                if(!context&&delta<0)context="Quiet stretch ";
                return{...p,...pl,delta,recentAvg,priorAvg,context:context.trim()};
              }).filter(Boolean);
              if(movers.length<6)return null;
              const risers=[...movers].filter(m=>m.delta>=3).sort((a,b)=>b.delta-a.delta).slice(0,3);
              const fallers=[...movers].filter(m=>m.delta<=-3).sort((a,b)=>a.delta-b.delta).slice(0,3);
              if(!risers.length&&!fallers.length)return null;
              return <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:0,padding:"16px 20px",marginBottom:20}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div>
                    <div style={{fontFamily:T.display,fontWeight:700,fontSize:16,color:T.ink}}>What Changed</div>
                    <div style={{fontSize:9,color:T.textMute,fontFamily:T.sans}}>Biggest recent movers — last 2 games vs prior form</div>
                  </div>
                </div>
                <div className="resp-grid3" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                  {risers.length>0&&<div>
                    <div style={{fontSize:8,color:T.green,fontWeight:700,letterSpacing:1.5,fontFamily:T.sans,marginBottom:8}}>↑ RISING</div>
                    {risers.map((p,i)=>(
                      <div key={p.id} onClick={()=>setSel(p)} className="rh" style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:0,cursor:"pointer",marginBottom:4}}>
                        <TeamBadge abbr={p.team} size={24} logo={p.teamLogo}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontFamily:T.serif,fontWeight:600,fontSize:12,color:T.ink}}>{p.name}</div>
                          <div style={{fontSize:8,color:T.textDim,fontFamily:T.sans}}>{p.context}</div>
                        </div>
                        <div style={{fontFamily:T.mono,fontWeight:700,fontSize:14,color:T.green}}>+{p.delta}</div>
                      </div>
                    ))}
                  </div>}
                  {fallers.length>0&&<div>
                    <div style={{fontSize:8,color:T.red,fontWeight:700,letterSpacing:1.5,fontFamily:T.sans,marginBottom:8}}>↓ FALLING</div>
                    {fallers.map((p,i)=>(
                      <div key={p.id} onClick={()=>setSel(p)} className="rh" style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:0,cursor:"pointer",marginBottom:4}}>
                        <TeamBadge abbr={p.team} size={24} logo={p.teamLogo}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontFamily:T.serif,fontWeight:600,fontSize:12,color:T.ink}}>{p.name}</div>
                          <div style={{fontSize:8,color:T.textDim,fontFamily:T.sans}}>{p.context}</div>
                        </div>
                        <div style={{fontFamily:T.mono,fontWeight:700,fontSize:14,color:T.red}}>{p.delta}</div>
                      </div>
                    ))}
                  </div>}
                </div>
              </div>;
            })()}

            {/* Top 3 Season Rated */}
            {srView==="table"&&top3.length>=3&&<div className="resp-grid3" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:24}}>
              {top3.map((p,i)=>(
                <div key={p.id} onClick={()=>setSel(p)} style={{
                  background:T.surface,border:`1px solid ${i===0?T.gold+"40":T.border}`,borderRadius:0,padding:"18px 16px",
                  cursor:"pointer",transition:"box-shadow .2s",boxShadow:i===0?"0 2px 12px rgba(182,141,64,.15)":"none",
                  borderTop:i===0?`3px solid ${T.gold}`:i===1?`3px solid ${T.green}`:i===2?`3px solid ${T.blue}`:"none",
                }} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,.1)"} onMouseLeave={e=>e.currentTarget.style.boxShadow=i===0?"0 2px 12px rgba(182,141,64,.15)":"none"}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                    <span style={{fontFamily:T.display,fontWeight:900,fontSize:22,color:i===0?T.gold:i===1?T.green:T.blue}}>{i+1}</span>
                    <TeamBadge abbr={p.team} size={36} logo={p.teamLogo}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:T.serif,fontWeight:700,fontSize:16,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:T.ink}}>{p.name}</div>
                      <div style={{fontSize:9,color:T.textDim,fontFamily:T.sans}}>{p.position} · {p.team}</div>
                    </div>
                    <span style={{fontFamily:T.display,fontWeight:700,fontSize:30,color:gc(p.seasonGrade),lineHeight:1}}>{p.seasonGrade}</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:6}}>
                    <div style={{textAlign:"center",padding:"6px 4px",background:T.card,borderRadius:0}}>
                      <div style={{fontFamily:T.mono,fontSize:12,fontWeight:700,color:formColor(p.formTrend)}}>{formIcon(p.formTrend)}</div>
                      <div style={{fontSize:7,color:T.textMute,letterSpacing:.5,marginTop:2}}>FORM</div>
                    </div>
                    <div style={{textAlign:"center",padding:"6px 4px",background:T.card,borderRadius:0}}>
                      <div style={{fontFamily:T.mono,fontSize:12,fontWeight:700,color:T.ink}}>{p.consistency}%</div>
                      <div style={{fontSize:7,color:T.textMute,letterSpacing:.5,marginTop:2}}>CONSIST</div>
                    </div>
                    <div style={{textAlign:"center",padding:"6px 4px",background:T.card,borderRadius:0}}>
                      <div style={{fontFamily:T.mono,fontSize:12,fontWeight:700,color:T.ink}}>{p.impactPer90}</div>
                      <div style={{fontSize:7,color:T.textMute,letterSpacing:.5,marginTop:2}}>IMP/90</div>
                    </div>
                    <div style={{textAlign:"center",padding:"6px 4px",background:T.card,borderRadius:0}}>
                      <div style={{fontFamily:T.serif,fontSize:11,fontWeight:700,color:profileColor(p.profile)}}>{p.profile.slice(0,3).toUpperCase()}</div>
                      <div style={{fontSize:7,color:T.textMute,letterSpacing:.5,marginTop:2}}>TYPE</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>}

            {/* Filters */}
            <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
              <Select label="Position" value={srPosFilter} onChange={setSrPosFilter} width={130} options={["All","Forward","Midfielder","Defender","GK"]}/>
              <Select label="Team" value={srTeamFilter} onChange={setSrTeamFilter} width={200} options={teamOpts}/>
              <Select label="Min. Mins" value={String(srMinMins)} onChange={v=>setSrMinMins(Number(v))} width={110} options={[["0","All"],["200","200+"],["400","400+"],["600","600+"],["900","900+"],["1200","1200+"]]}/>
              <Select label="Sort" value={srSort} onChange={v=>{setSrSort(v);setSrDir(v==="age"?"asc":"desc");}} width={150} options={[["seasonGrade","Season Grade"],["consistency","Consistency"],["impactPer90","Impact/90"],["goals","Goals"],["assists","Assists"],["overall","Match Grade"],["age","Age"]]}/>
            </div>

            {/* ── TABLE VIEW ── */}
            {srView==="table"&&<TableWrap><div>
              {(()=>{const srTbl=isMobile?"28px 1fr 42px 32px 38px 38px 42px":"30px 1fr 56px 80px 50px 50px 60px 60px 64px";return <>
              <div style={{display:"grid",gridTemplateColumns:srTbl,padding:isMobile?"6px 6px":"10px 14px",background:T.card,fontSize:isMobile?8:11,color:T.textMute,fontWeight:600,letterSpacing:.8,borderBottom:`1px solid ${T.border}`,fontFamily:T.sans,textTransform:"uppercase"}}>
                <div style={{textAlign:"center"}}>#</div><div>Player</div>
                <ColHead label="SZN" sortKey="seasonGrade" currentSort={srSort} currentDir={srDir} onSort={toggleSrSort} center/>
                <div style={{textAlign:"center"}}>{isMobile?"Form":"Form Curve"}</div>
                <ColHead label="G" sortKey="goals" currentSort={srSort} currentDir={srDir} onSort={toggleSrSort} center/>
                <ColHead label="A" sortKey="assists" currentSort={srSort} currentDir={srDir} onSort={toggleSrSort} center/>
                <ColHead label={isMobile?"Con":"Consist"} sortKey="consistency" currentSort={srSort} currentDir={srDir} onSort={toggleSrSort} center/>
                {!isMobile&&<ColHead label="Imp/90" sortKey="impactPer90" currentSort={srSort} currentDir={srDir} onSort={toggleSrSort} center/>}
                {!isMobile&&<ColHead label="G+" sortKey="totalGA" currentSort={srSort} currentDir={srDir} onSort={toggleSrSort} center/>}
              </div>
              {srFiltered.map((p,i)=><div key={p.id} onClick={()=>setSel(p)} className="rh" style={{display:"grid",gridTemplateColumns:srTbl,padding:isMobile?"8px 6px":"14px 14px",minHeight:isMobile?40:48,borderBottom:`1px solid ${T.borderLt}`,background:i%2===0?"transparent":T.surface,alignItems:"center",cursor:"pointer",animation:`fadeUp .25s ease both`,animationDelay:`${Math.min(i*12,250)}ms`}}>
                <div style={{fontFamily:T.serif,fontWeight:700,fontSize:isMobile?13:16,color:i<3?T.gold:i<10?T.green:T.textMute,textAlign:"center"}}>{i+1}</div>
                <div style={{display:"flex",alignItems:"center",gap:isMobile?6:12,marginLeft:isMobile?0:6,minWidth:0}}>
                  <TeamBadge abbr={p.team} size={isMobile?24:36} logo={p.teamLogo}/>
                  <div style={{minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontFamily:T.serif,fontWeight:700,fontSize:isMobile?13:20,color:T.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{shortName(p.name)}</span>
                      {!isMobile&&(p.mins||0)<450&&<span style={{fontSize:7,fontFamily:T.sans,fontWeight:700,color:T.textMute,background:`${T.textMute}15`,padding:"1px 5px",borderRadius:0,letterSpacing:.5,flexShrink:0}}>PROV</span>}
                    </div>
                    <div style={{fontSize:isMobile?10:14,color:T.textDim,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.position} · {p.team} · {p.mins} min</div>
                  </div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",background:gb(p.seasonGrade),border:`1.5px solid ${gc(p.seasonGrade)}30`,borderRadius:0,padding:isMobile?"2px 7px":"4px 10px",minWidth:isMobile?34:40}}>
                    <span style={{color:gc(p.seasonGrade),fontWeight:700,fontSize:isMobile?14:17,fontFamily:T.serif,letterSpacing:-.5,lineHeight:1}}>{p.seasonGrade}</span>
                  </div>
                </div>
                <div style={{textAlign:"center",fontFamily:T.mono,fontWeight:700,fontSize:isMobile?12:14,color:formColor(p.formTrend),display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {isMobile?formIcon(p.formTrend):<MiniSpark data={genFormCurve(p)} width={68} height={22} color={gc(p.seasonGrade)}/>}
                </div>
                <div style={{fontFamily:T.serif,fontWeight:700,fontSize:isMobile?13:16,color:T.ink,background:hm(p.goals,20),borderRadius:0,textAlign:"center",padding:"2px 0"}}>{p.goals}</div>
                <div style={{fontFamily:T.serif,fontWeight:700,fontSize:isMobile?13:16,color:T.ink,background:hm(p.assists,15),borderRadius:0,textAlign:"center",padding:"2px 0"}}>{p.assists}</div>
                <div style={{textAlign:"center"}}>
                  <span style={{fontFamily:T.mono,fontWeight:600,fontSize:isMobile?11:12,color:p.consistency>=80?T.green:p.consistency>=60?T.blue:T.red,background:`${p.consistency>=80?T.green:p.consistency>=60?T.blue:T.red}10`,padding:"2px 6px",borderRadius:0}}>{p.consistency}%</span>
                </div>
                {!isMobile&&<div style={{fontSize:13,color:T.ink,fontWeight:600,fontFamily:T.mono,textAlign:"center"}}>{p.impactPer90}</div>}
                {!isMobile&&<div style={{fontSize:14,color:+p.totalGA>=0?T.green:T.red,fontWeight:700,fontFamily:T.mono,textAlign:"center"}}>{+p.totalGA>=0?"+":""}{p.totalGA}</div>}
              </div>)}
              </>})()}
            </div></TableWrap>}

            {/* ── POSITION VIEW ── */}
            {srView==="position"&&(()=>{
              // Build position groups from filtered data
              const filteredByPos={};srFiltered.forEach(p=>{if(!filteredByPos[p.posGroup])filteredByPos[p.posGroup]=[];filteredByPos[p.posGroup].push(p);});
              Object.values(filteredByPos).forEach(arr=>arr.sort((a,b)=>b.seasonGrade-a.seasonGrade));
              return <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(320px,1fr))",gap:16}}>
              {Object.entries(filteredByPos).sort(([a],[b])=>({FW:0,MF:1,DF:2,GK:3}[a]||4)-({FW:0,MF:1,DF:2,GK:3}[b]||4)).map(([pos,posPlayers])=>{
                const posLabel={FW:"Forwards",MF:"Midfielders",DF:"Defenders",GK:"Goalkeepers"}[pos]||pos;
                const posAvg=Math.round(posPlayers.reduce((s,p)=>s+p.seasonGrade,0)/posPlayers.length);
                return <div key={pos} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:0,overflow:"hidden"}}>
                  <div style={{padding:"16px 18px",borderBottom:`1px solid ${T.borderLt}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div>
                      <div style={{fontFamily:T.display,fontWeight:700,fontSize:20,color:T.ink}}>{posLabel}</div>
                      <div style={{fontSize:9,color:T.textMute,fontFamily:T.sans}}>{posPlayers.length} players · Avg {posAvg}</div>
                    </div>
                    <Badge grade={posAvg} size="md"/>
                  </div>
                  {posPlayers.map((p,i)=>(
                    <div key={p.id} onClick={()=>setSel(p)} className="rh" style={{display:"flex",alignItems:"center",gap:10,padding:"10px 18px",borderBottom:`1px solid ${T.borderLt}`,cursor:"pointer"}}>
                      <div style={{fontFamily:T.display,fontWeight:900,fontSize:16,color:i<3?T.gold:i<10?T.green:T.textMute,width:22,textAlign:"center"}}>{i+1}</div>
                      <TeamBadge abbr={p.team} size={28} logo={p.teamLogo}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontFamily:T.serif,fontWeight:600,fontSize:14,color:T.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</span>
                          {(p.mins||0)<450&&<span style={{fontSize:7,fontFamily:T.sans,fontWeight:700,color:T.textMute,background:`${T.textMute}15`,padding:"1px 5px",borderRadius:0,letterSpacing:.5,flexShrink:0}}>PROV</span>}
                        </div>
                        <div style={{fontSize:9,color:T.textDim,fontFamily:T.sans}}>{p.team} · {p.gamesPlayed} apps · {p.mins} min</div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontFamily:T.mono,fontWeight:700,fontSize:11,color:formColor(p.formTrend)}}>{formIcon(p.formTrend)}</span>
                        <span style={{fontFamily:T.mono,fontSize:10,color:p.consistency>=70?T.green:T.textDim}}>{p.consistency}%</span>
                        <div style={{display:"inline-flex",flexDirection:"column",alignItems:"center",background:gb(p.seasonGrade),border:`1.5px solid ${gc(p.seasonGrade)}30`,borderRadius:0,padding:"2px 8px",minWidth:36}}>
                          <span style={{color:gc(p.seasonGrade),fontWeight:700,fontSize:15,fontFamily:T.serif,lineHeight:1}}>{p.seasonGrade}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>;
              })}
            </div>;})()}

            {/* ── TIERS VIEW ── */}
            {srView==="tiers"&&(()=>{
              const filteredTiers=[
                {label:"ELITE",min:85,color:T.gold,players:srFiltered.filter(p=>p.seasonGrade>=85)},
                {label:"GREAT",min:75,color:T.green,players:srFiltered.filter(p=>p.seasonGrade>=75&&p.seasonGrade<85)},
                {label:"ABOVE AVG",min:65,color:T.blue,players:srFiltered.filter(p=>p.seasonGrade>=65&&p.seasonGrade<75)},
                {label:"AVERAGE",min:55,color:T.textDim,players:srFiltered.filter(p=>p.seasonGrade>=55&&p.seasonGrade<65)},
                {label:"POOR",min:0,color:T.red,players:srFiltered.filter(p=>p.seasonGrade<55)},
              ];
              return <div>
              {/* Tier distribution bar */}
              <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:0,padding:"20px 24px",marginBottom:20}}>
                <div style={{fontSize:10,color:T.textMute,fontWeight:600,letterSpacing:1.5,fontFamily:T.sans,textTransform:"uppercase",marginBottom:14}}>Grade Distribution · {srFiltered.length} Players</div>
                <div style={{display:"flex",height:32,borderRadius:0,overflow:"hidden",marginBottom:12}}>
                  {filteredTiers.filter(t=>t.players.length>0).map(t=>(
                    <div key={t.label} style={{flex:t.players.length,background:t.color,opacity:.7,display:"flex",alignItems:"center",justifyContent:"center",minWidth:24,transition:"flex .4s ease"}}>
                      <span style={{fontSize:10,fontWeight:700,color:"#fff",textShadow:"0 1px 2px rgba(0,0,0,.3)",fontFamily:T.sans}}>{t.players.length}</span>

                  ))}
                </div>
                <div style={{display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap"}}>
                  {filteredTiers.map(t=>(
                    <div key={t.label} style={{display:"flex",alignItems:"center",gap:5}}>
                      <div style={{width:10,height:10,borderRadius:0,background:t.color,opacity:.7}}/>
                      <span style={{fontSize:10,fontFamily:T.sans,fontWeight:600,color:T.textDim}}>{t.label} ({t.players.length})</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Tier groups */}
              {filteredTiers.filter(t=>t.players.length>0).map(tier=>(
                <div key={tier.label} style={{marginBottom:20}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                    <div style={{width:4,height:24,borderRadius:0,background:tier.color}}/>
                    <span style={{fontFamily:T.display,fontWeight:700,fontSize:18,color:tier.color}}>{tier.label}</span>
                    <span style={{fontSize:11,color:T.textMute,fontFamily:T.sans}}>{tier.players.length} player{tier.players.length!==1?"s":""}</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:8}}>
                    {tier.players.map(p=>(
                      <div key={p.id} onClick={()=>setSel(p)} className="rh" style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:0,cursor:"pointer"}}>

                          <div style={{display:"flex",alignItems:"center",gap:5}}>
                            <span style={{fontFamily:T.serif,fontWeight:600,fontSize:13,color:T.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</span>
                            {(p.mins||0)<450&&<span style={{fontSize:7,fontFamily:T.sans,fontWeight:700,color:T.textMute,background:`${T.textMute}15`,padding:"1px 5px",borderRadius:0,letterSpacing:.5,flexShrink:0}}>PROV</span>}
                          </div>
                          <div style={{fontSize:8,color:T.textDim,fontFamily:T.sans}}>{p.position} · {p.team} · #{p.posRank} {p.posGroup} · {p.mins} min</div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontFamily:T.mono,fontWeight:700,fontSize:11,color:formColor(p.formTrend)}}>{formIcon(p.formTrend)}</span>
                          <span style={{fontFamily:T.display,fontWeight:700,fontSize:18,color:gc(p.seasonGrade)}}>{p.seasonGrade}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>;})()}

            {/* How Season Rating Works */}
            <div style={{marginTop:28,padding:"18px 22px",background:T.card,border:`1px solid ${T.borderLt}`,borderRadius:0}}>
              <div style={{fontSize:10,color:T.textMute,fontWeight:700,letterSpacing:2,fontFamily:T.sans,marginBottom:8}}>HOW SEASON RATING WORKS</div>
              <div style={{fontSize:11,color:T.textDim,fontFamily:T.sans,lineHeight:1.7}}>
                The Season Rating is a cumulative performance index built from real match-level data. When per-game boxscore data is available (via ESPN), each player gets a per-match rating based on goals (+12), assists (+8), shots on target (+2), shots (+0.5), minutes played, fouls (-1), cards (-3/-10). The form sparkline shows this real game-by-game trajectory. The cumulative grade combines the weighted composite of all six grade categories (30% Overall, 15% Attack, 15% Passing, 15% Defense, 12.5% Creativity, 12.5% Carrying), plus bonuses for Goals Added contribution, minutes durability, and goal involvement. Players with fewer than 450 minutes are tagged as provisional (PROV). Use the Min. Mins filter to focus on established starters or see the full roster.
              </div>
            </div>
          </div>;
        })()}

        {/* ═══ DEFENSE ═══════════════════════════════════════════════════════ */}
        {!loading&&tab==="defense"&&(()=>{const c=POS[posFilter];const defData=[...players].filter(p=>(!c||c.includes(p.position))&&(teamFilter==="All"||p.team===teamFilter)&&(p.mins||0)>=minMins).sort((a,b)=>{const dir=sortDir==="asc"?1:-1;if(sortKey==="age")return dir*(parseFloat(a.age||99)-parseFloat(b.age||99));const av=Number(a[sortKey])||0,bv=Number(b[sortKey])||0;return dir*(av-bv);}).slice(0,100);
          return <div style={{animation:"fadeUp .4s ease"}}>
          <div style={{marginBottom:14}}>
            <div style={{fontFamily:T.display,fontWeight:700,fontSize:26,color:T.ink,letterSpacing:-.5}}>Defensive Leaders</div>
            <div style={{fontSize:12,color:T.textMute,fontFamily:T.sans,marginTop:4}}>Tackles, pressures, interceptions, and aerial duels. Ranked by defensive output across all positions.</div>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
            <Select label="Position" value={posFilter} onChange={setPosFilter} width={130} options={["All","Forward","Midfielder","Defender","GK"]}/>
            <Select label="Team" value={teamFilter} onChange={setTeamFilter} width={200} options={teamOpts}/>
            <Select label="Min. Mins" value={String(minMins)} onChange={v=>setMinMins(Number(v))} width={100} options={[["0","All"],["200","200+"],["400","400+"],["600","600+"],["900","900+"]]}/>
          </div>
          <TopCards players={defData} metric={p=>p.clearances} metricLabel="CLEARANCES" onSelect={setSel}/>
          <TableWrap><div>
            {(()=>{const defTbl=isMobile?"24px 1fr 40px 46px 46px 46px":"24px 1fr 48px 58px 58px 50px 50px 60px 56px";return <>
            <div style={{display:"grid",gridTemplateColumns:defTbl,padding:isMobile?"8px 10px":"10px 14px",background:T.card,fontSize:isMobile?9:11,color:T.textMute,fontWeight:600,letterSpacing:.8,borderBottom:`1px solid ${T.border}`,fontFamily:T.sans,textTransform:"uppercase"}}><div style={{textAlign:"center"}}>#</div><div>Player</div><ColHead label="Def" sortKey="defense" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="Aer%"/*3B2*/ sortKey="aerialPct" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="Prs" sortKey="pressures" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>{!isMobile&&<ColHead label="Clr" sortKey="clearances" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>}{!isMobile&&<ColHead label="Fls" sortKey="fouls" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>}{!isMobile&&<div style={{textAlign:"center"}}>YC/RC</div>}<ColHead label="G+" sortKey="totalGA" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/></div>
            {defData.map((p,i)=><div key={p.id} onClick={()=>setSel(p)} className="rh" style={{display:"grid",gridTemplateColumns:defTbl,padding:isMobile?"10px 10px":"14px 14px",minHeight:isMobile?40:48,borderBottom:`1px solid ${T.borderLt}`,background:i%2===0?"transparent":T.surface,alignItems:"center",cursor:"pointer"}}>
              <div style={{fontFamily:T.serif,fontWeight:700,fontSize:isMobile?13:16,color:i<3?T.accent:T.textMute,textAlign:"center"}}>{i+1}</div>
              <div style={{display:"flex",alignItems:"center",gap:isMobile?6:12,marginLeft:isMobile?0:6,minWidth:0}}><TeamBadge abbr={p.team} size={isMobile?24:36} logo={p.teamLogo}/><div style={{minWidth:0}}><div style={{fontFamily:T.serif,fontWeight:700,fontSize:isMobile?13:20,color:T.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{shortName(p.name)}</div><div style={{fontSize:isMobile?10:14,color:T.textDim,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.position} · {p.team}</div></div></div>
              <div style={{textAlign:"center"}}><Badge grade={p.defense} size={isMobile?"sm":"md"}/></div>
              <div style={{fontFamily:T.serif,fontWeight:700,fontSize:isMobile?13:16,color:T.ink,background:hm(p.aerialPct,100),borderRadius:0,textAlign:"center",padding:"2px 0"}}>{p.aerialAtt>0?p.aerialPct+"%":"—"}</div>
              <div style={{fontSize:isMobile?13:15,color:T.ink,fontWeight:600,background:hm(p.pressures,300),borderRadius:0,textAlign:"center",padding:"2px 0"}}>{sv(p.pressures)}</div>
              {!isMobile&&<div style={{fontSize:14,color:T.textDim,background:hm(p.clearances,40),borderRadius:0,textAlign:"center",padding:"2px 0"}}>{sv(p.clearances)}</div>}
              {!isMobile&&<div style={{fontSize:13,color:T.textDim,textAlign:"center"}}>{sv(p.fouls)}</div>}
              {!isMobile&&<div style={{display:"flex",gap:4,justifyContent:"center",alignItems:"center"}}><div style={{width:8,height:10,borderRadius:0,background:"#E8C94A"}}/><span style={{fontSize:12}}>{sv(p.yellowCards)}</span><div style={{width:8,height:10,borderRadius:0,background:T.red}}/><span style={{fontSize:12}}>{sv(p.redCards)}</span></div>}
              <div style={{fontSize:isMobile?11:14,color:+p.totalGA>=0?T.green:T.red,fontWeight:700,fontFamily:T.mono,textAlign:"center"}}>{+p.totalGA>=0?"+":""}{p.totalGA}</div>
            </div>)}
            </>})()}
          </div></TableWrap>
        </div>})()}

        {/* ═══ PASSING ═══════════════════════════════════════════════════════ */}
        {!loading&&tab==="passing"&&(()=>{const c=POS[posFilter];const passData=[...players].filter(p=>+p.passComp>0&&(!c||c.includes(p.position))&&(teamFilter==="All"||p.team===teamFilter)&&(p.mins||0)>=Math.max(minMins,200)).sort((a,b)=>{const dir=sortDir==="asc"?1:-1;if(sortKey==="age")return dir*(parseFloat(a.age||99)-parseFloat(b.age||99));const av=Number(a[sortKey])||0,bv=Number(b[sortKey])||0;return dir*(av-bv);}).slice(0,100);
          return <div style={{animation:"fadeUp .4s ease"}}>
          <div style={{marginBottom:14}}>
            <div style={{fontFamily:T.display,fontWeight:700,fontSize:26,color:T.ink,letterSpacing:-.5}}>Passing Analytics</div>
            <div style={{fontSize:12,color:T.textMute,fontFamily:T.sans,marginTop:4}}>Completion rate, expected completion, progressive passes, and passing Goals Added. Compares actual vs expected to find passers who beat the model.</div>
          </div>
          <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
            <Select label="Position" value={posFilter} onChange={setPosFilter} width={130} options={["All","Forward","Midfielder","Defender","GK"]}/>
            <Select label="Team" value={teamFilter} onChange={setTeamFilter} width={200} options={teamOpts}/>
            <Select label="Min. Mins" value={String(minMins)} onChange={v=>setMinMins(Number(v))} width={100} options={[["0","All"],["200","200+"],["400","400+"],["600","600+"],["900","900+"]]}/>
          </div>
          <TopCards players={passData} metric={p=>p.passComp+"%"} metricLabel="COMPLETION" onSelect={setSel}/>
          <TableWrap><div>
            {(()=>{const passTbl=isMobile?"24px 1fr 40px 56px 52px 46px":"24px 1fr 48px 68px 68px 68px 56px 56px 56px";return <>
            <div style={{display:"grid",gridTemplateColumns:passTbl,padding:isMobile?"8px 10px":"10px 14px",background:T.card,fontSize:isMobile?9:11,color:T.textMute,fontWeight:600,letterSpacing:.8,borderBottom:`1px solid ${T.border}`,fontFamily:T.sans,textTransform:"uppercase"}}><div style={{textAlign:"center"}}>#</div><div>Player</div><ColHead label="Pass" sortKey="passing" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="Comp%" sortKey="passComp" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>{!isMobile&&<div style={{textAlign:"center"}}>xComp%</div>}<div style={{textAlign:"center"}}>{isMobile?"±Exp":"vs Exp"}</div>{!isMobile&&<ColHead label="PrgP" sortKey="prgPasses" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>}{!isMobile&&<ColHead label="F3rd" sortKey="ftPasses" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/>}<ColHead label="G+" sortKey="totalGA" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/></div>
            {passData.map((p,i)=>{const ae=Number(p.passAboveExp);return <div key={p.id} onClick={()=>setSel(p)} className="rh" style={{display:"grid",gridTemplateColumns:passTbl,padding:isMobile?"10px 10px":"14px 14px",minHeight:isMobile?40:48,borderBottom:`1px solid ${T.borderLt}`,background:i%2===0?"transparent":T.surface,alignItems:"center",cursor:"pointer"}}>
              <div style={{fontFamily:T.serif,fontWeight:700,fontSize:isMobile?13:16,color:i<3?T.accent:T.textMute,textAlign:"center"}}>{i+1}</div>
              <div style={{display:"flex",alignItems:"center",gap:isMobile?6:12,marginLeft:isMobile?0:6,minWidth:0}}><TeamBadge abbr={p.team} size={isMobile?24:36} logo={p.teamLogo}/><div style={{minWidth:0}}><div style={{fontFamily:T.serif,fontWeight:700,fontSize:isMobile?13:20,color:T.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{shortName(p.name)}</div><div style={{fontSize:isMobile?10:14,color:T.textDim,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.position} · {p.team}</div></div></div>
              <div style={{textAlign:"center"}}><Badge grade={p.passing} size={isMobile?"sm":"md"}/></div>
              <div style={{fontSize:isMobile?12:14,color:T.ink,fontFamily:T.mono,fontWeight:600,background:hm(+p.passComp,100),borderRadius:0,textAlign:"center",padding:"2px 0"}}>{p.passComp}%</div>
              {!isMobile&&<div style={{fontSize:12,color:T.textDim,fontFamily:T.mono,textAlign:"center"}}>{p.xPassComp}%</div>}
              <div style={{fontSize:isMobile?11:12,color:ae>=0?T.green:T.red,fontWeight:700,fontFamily:T.mono,textAlign:"center"}}>{ae>=0?"+":""}{p.passAboveExp||"—"}%</div>
              {!isMobile&&<div style={{fontSize:13,color:T.ink,fontWeight:600,background:hm(p.prgPasses,120),borderRadius:0,textAlign:"center",padding:"2px 0"}}>{sv(p.keyPasses)}</div>}
              {!isMobile&&<div style={{fontSize:11,color:T.textDim,textAlign:"center"}}>{sv(p.ftPasses)}</div>}
              <div style={{fontSize:isMobile?11:11,color:+p.passGA>=0?T.green:T.red,fontWeight:700,fontFamily:T.mono,textAlign:"center"}}>{+p.passGA>=0?"+":""}{p.passGA}</div>
            </div>;})}
            </>})()}
          </div></TableWrap>
        </div>})()}

        {/* ═══ TEAMS ═════════════════════════════════════════════════════════ */}
        {!loading&&tab==="teams"&&<div style={{animation:"fadeUp .4s ease"}}>
          <div style={{marginBottom:16}}>
            <div style={{fontFamily:T.display,fontWeight:700,fontSize:26,color:T.ink,letterSpacing:-.5}}>Team Analytics</div>
            <div style={{fontSize:12,color:T.textMute,fontFamily:T.sans,marginTop:4}}>Composite team grades averaged across each roster. Click to expand team stats and full roster breakdowns.</div>
          </div>
          <div style={{marginBottom:16}}><Select label="Conference" value={confFilter} onChange={setConfFilter} width={150} options={["All","Eastern","Western"]}/>
            </div>
          <TableWrap><div>
            <div style={{display:"grid",gridTemplateColumns:"36px 1fr 50px 52px 80px 36px",padding:"10px 14px",background:T.card,fontSize:11,color:T.textMute,fontWeight:600,letterSpacing:.8,borderBottom:`1px solid ${T.border}`,fontFamily:T.sans,textTransform:"uppercase"}}><div>Rk</div><div>Team</div><ColHead label="Grade" sortKey="overall" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="Plrs" sortKey="count" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><ColHead label="Squad Val" sortKey="squadValue" currentSort={sortKey} currentDir={sortDir} onSort={toggleSort} center/><div></div></div>
            {enrichedTeams.filter(t=>confFilter==="All"||t.conf===confFilter).sort((a,b)=>{const dir=sortDir==="asc"?1:-1;const av=Number(a[sortKey])||0,bv=Number(b[sortKey])||0;return dir*(av-bv);}).map((t,i)=>{
              const isOpen=expandTeam===t.abbr;
              const level=isOpen?teamLevel:0;
              const rosterTbl="1fr 40px 44px 36px 36px 48px 48px 42px 42px 50px";
              const rosterRaw=players.filter(p=>p.team===t.abbr);
              const dir=rosterDir==="asc"?1:-1;
              const roster=[...rosterRaw].sort((a,b)=>{if(rosterSort==="age")return dir*(parseFloat(a.age||99)-parseFloat(b.age||99));const av=parseFloat(a[rosterSort])||a[rosterSort]||0,bv=parseFloat(b[rosterSort])||b[rosterSort]||0;return dir*(av-bv);});

              return <div key={t.abbr}>
                {/* Team row */}
                <div onClick={()=>toggleTeam(t.abbr)} className="rh" style={{display:"grid",gridTemplateColumns:"36px 1fr 50px 52px 80px 36px",padding:"14px 16px",borderBottom:`1px solid ${isOpen?T.border:T.borderLt}`,alignItems:"center",cursor:"pointer",background:isOpen?T.card:"transparent"}}>
                  <div style={{fontFamily:T.serif,fontWeight:700,fontSize:16,color:i<3?T.accent:T.textMute}}>{i+1}</div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}><TeamBadge abbr={t.abbr} size={34} logo={teamLogos[t.abbr]}/><div><div style={{fontFamily:T.serif,fontWeight:700,fontSize:18,color:T.ink}}>{t.name}</div><div style={{fontSize:12,color:T.textDim,fontFamily:T.sans}}>{t.conf}</div></div></div>
                  <div style={{textAlign:"center"}}><Badge grade={t.overall} size="md"/></div>
                  <div style={{fontSize:12,color:T.textDim,textAlign:"center"}}>{t.count}</div>
                  <div style={{fontFamily:T.serif,fontWeight:600,fontSize:12,color:vc(t.squadValue),textAlign:"center"}}>{t.squadValue>0?fv(t.squadValue):"—"}</div>
                  <div style={{fontSize:10,color:T.textMute,textAlign:"center"}}>{level===2?"▲":level===1?"▼▼":"▼"}</div>
                </div>

                {/* Level 1: Team stats */}
                {isOpen&&level>=1&&<div style={{background:T.card,padding:"16px 20px",borderBottom:level===1?`2px solid ${T.border}`:"none",animation:"fadeUp .2s ease"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <div style={{fontSize:9,color:T.textMute,fontWeight:600,letterSpacing:1.5,fontFamily:T.sans,textTransform:"uppercase"}}>{t.name} · Team Overview</div>
                    <div style={{fontSize:9,color:T.accent,fontWeight:600,fontFamily:T.sans,cursor:"pointer"}} onClick={e=>{e.stopPropagation();setTeamLevel(2);}}>View Roster →</div>
                  </div>

                  {/* Grade boxes */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8,marginBottom:16}}>
                    {[{l:"Overall",g:t.overall},{l:"Attack",g:t.attack},{l:"Passing",g:t.passing},{l:"Defense",g:t.defense},{l:"Creative",g:t.creativity},{l:"Carry",g:t.carrying}].map(r=>(
                      <div key={r.l} style={{background:T.bg,border:`1px solid ${T.borderLt}`,borderRadius:0,padding:"12px",textAlign:"center"}}>
                        <div style={{fontFamily:T.display,fontWeight:700,fontSize:26,color:gc(r.g),lineHeight:1}}>{r.g}</div>
                        <div style={{fontSize:7,color:gc(r.g),fontWeight:600,letterSpacing:1,marginTop:3,textTransform:"uppercase"}}>{gl(r.g)}</div>
                        <div style={{fontSize:9,color:T.textMute,marginTop:2,fontFamily:T.sans}}>{r.l}</div>
                      </div>
                    ))}
                  </div>

                  {/* Key stats row */}
                  <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:8}}>
                    {[
                      {l:"Total Goals",v:t.totalGoals,c:T.ink},
                      {l:"Total Assists",v:t.totalAssists,c:T.ink},
                      {l:"Avg Age",v:t.avgAge||"—",c:T.textDim},
                      {l:"Total Tackles",v:t.totalTackles,c:T.ink},
                      {l:"Squad Value",v:fv(t.squadValue),c:vc(t.squadValue)},
                      {l:"Players",v:t.count,c:T.textDim},
                    ].map(s=>(
                      <div key={s.l} style={{textAlign:"center",padding:"8px 4px",background:T.bg,borderRadius:0,border:`1px solid ${T.borderLt}`}}>
                        <div style={{fontFamily:T.serif,fontWeight:700,fontSize:16,color:s.c,lineHeight:1}}>{s.v}</div>
                        <div style={{fontSize:7,color:T.textMute,fontWeight:600,letterSpacing:.8,marginTop:4,fontFamily:T.sans,textTransform:"uppercase"}}>{s.l}</div>
                      </div>
                    ))}
                  </div>

                  {/* Standout players */}
                  {(t.topScorer||t.topRated)&&<div style={{display:"flex",gap:12,marginTop:14}}>
                    {t.topRated&&<div style={{flex:1,display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:T.bg,borderRadius:0,border:`1px solid ${T.borderLt}`,cursor:"pointer"}} onClick={e=>{e.stopPropagation();setSel(t.topRated);}}>
                      <div style={{width:4,height:24,borderRadius:0,background:gc(t.topRated.overall)}}/>
                      <div style={{flex:1}}><div style={{fontSize:8,color:T.textMute,fontWeight:600,letterSpacing:1,fontFamily:T.sans}}>TOP RATED</div><div style={{fontFamily:T.serif,fontWeight:700,fontSize:13,color:T.ink}}>{t.topRated.name}</div></div>
                      <Badge grade={t.topRated.overall} rated={t.topRated.rated} size="sm"/>
                    </div>}
                    {t.topScorer&&t.topScorer.id!==t.topRated?.id&&<div style={{flex:1,display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:T.bg,borderRadius:0,border:`1px solid ${T.borderLt}`,cursor:"pointer"}} onClick={e=>{e.stopPropagation();setSel(t.topScorer);}}>
                      <div style={{width:4,height:24,borderRadius:0,background:T.accent}}/>
                      <div style={{flex:1}}><div style={{fontSize:8,color:T.textMute,fontWeight:600,letterSpacing:1,fontFamily:T.sans}}>TOP SCORER</div><div style={{fontFamily:T.serif,fontWeight:700,fontSize:13,color:T.ink}}>{t.topScorer.name}</div></div>
                      <div style={{fontFamily:T.serif,fontWeight:700,fontSize:16,color:T.ink}}>{t.topScorer.goals}G</div>
                    </div>}
                  </div>}

              const normPts=(t.pts/maxPts)*100;

              const teamMatches=[...matchesData].filter(m=>m.completed&&(m.home===t.abbr||m.away===t.abbr)).sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,5);

          {/* ── PLAYOFF PROBABILITY ── */}

            });
            const teams=Object.values(teamData);
            if(!teams.length||!teams[0].remaining)return null;
            // Simple simulation: for each remaining game, win=40%, draw=30%, loss=30% weighted by current form
            const results={};
            teams.forEach(t=>{results[t.abbr]={playoff:0,shield:0,totalPts:0};});
            for(let s=0;s<sims;s++){
              const simPts={};

                const winRate=Math.min(0.65,0.2+(t.pts/(t.played||1)*3)/100);
                let pts=t.pts;
                for(let g=0;g<t.remaining;g++){
                  const r=Math.random();
                  if(r<winRate)pts+=3;
                  else if(r<winRate+0.28)pts+=1;
                }
                simPts[t.abbr]=pts;
              });
              // Top 9 per conference make playoffs
              const east=teams.filter(t=>t.conf==="Eastern").map(t=>({...t,simPts:simPts[t.abbr]})).sort((a,b)=>b.simPts-a.simPts);

          {(()=>{

            const byDate={};allLogs.forEach(l=>{if(!byDate[l.dateKey])byDate[l.dateKey]=[];byDate[l.dateKey].push(l);});
            const dateKeys=Object.keys(byDate).sort();
            const weeks=[];let current=[];
            dateKeys.forEach((dk,i)=>{
              current.push(dk);
              const next=dateKeys[i+1];

            const gkLogs=bestAt(["GK","Goalkeeper"])||[];

              {slot:"GK",l:gkLogs[0],x:50,y:90},
