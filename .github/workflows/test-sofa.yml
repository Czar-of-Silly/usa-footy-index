name: Test Sofascore reachability

# Manual trigger only — run it from the Actions tab, read the log, then delete this file.
on:
  workflow_dispatch:

jobs:
  ping-sofascore:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Sofascore from the runner
        run: |
          cat > sofatest.js <<'EOF'
          const _https = require("https"), zlib = require("zlib");
          const SOFA = "https://api.sofascore.com/api/v1";
          function sofaGet(ep){return new Promise((resolve,reject)=>{
            const u=new URL(`${SOFA}${ep}`);
            const req=_https.request({hostname:u.hostname,port:443,path:u.pathname+u.search,method:"GET",
              headers:{"User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36","Accept":"application/json, text/plain, */*","Accept-Language":"en-US,en;q=0.9","Accept-Encoding":"gzip, deflate, br","Referer":"https://www.sofascore.com/","Origin":"https://www.sofascore.com","Sec-Fetch-Site":"same-site"},
              ciphers:"TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256"},res=>{
              const enc=res.headers["content-encoding"];const chunks=[];
              const st=enc==="gzip"?res.pipe(zlib.createGunzip()):enc==="br"?res.pipe(zlib.createBrotliDecompress()):enc==="deflate"?res.pipe(zlib.createInflate()):res;
              st.on("data",c=>chunks.push(c));st.on("end",()=>resolve({status:res.statusCode,body:Buffer.concat(chunks).toString()}));st.on("error",reject);
            });req.on("error",reject);req.end();
          });}
          (async()=>{
            console.log("Runner public IP:");
            try{ const ipr=await sofaGet.call(null,""); }catch(e){}
            let r;
            try{ r=await sofaGet("/unique-tournament/242/seasons"); }
            catch(e){ console.log("NETWORK ERROR:",e.message); process.exit(0); }
            console.log("\n=== Sofascore /seasons -> HTTP", r.status, "===");
            if(r.status!==200){
              console.log("BLOCKED from GitHub Actions:", r.body.slice(0,160));
              console.log("\n>>> RESULT: Sofascore is NOT reachable from the cron. <<<");
              process.exit(0);
            }
            const seasons=JSON.parse(r.body).seasons||[];
            const cur=seasons.find(s=>String(s.year).includes("2026"))||seasons[0];
            console.log("reachable. current season:",cur.year,"(id",cur.id+")");
            const ep=`/unique-tournament/242/season/${cur.id}/statistics?limit=8&offset=0&order=-tackles&accumulation=total&group=defensive`;
            let r2; try{ r2=await sofaGet(ep);}catch(e){console.log("stats err",e.message);process.exit(0);}
            console.log("\n=== statistics(tackles) -> HTTP", r2.status, "===");
            if(r2.status===200){
              const res=(JSON.parse(r2.body).results)||[];
              res.slice(0,8).forEach(x=>console.log("  ",(x.player?.name||"?").padEnd(22),"tackles:",x.tackles,"intc:",x.interceptions));
              console.log("\n>>> RESULT: Sofascore WORKS from the cron — we just re-enable it. <<<");
            } else {
              console.log(r2.body.slice(0,160));
              console.log("\n>>> RESULT: seasons reachable but stats blocked. <<<");
            }
          })();
          EOF
          curl -s https://api.ipify.org && echo " (this runner's IP)"
          node sofatest.js
