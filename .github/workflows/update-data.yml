name: Update MLS Data

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout latest
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Fetch fresh 2026 data
        run: node fetch-data.js
        timeout-minutes: 20

      - name: Copy data to public folder
        run: |
          cp data/mls-cache.json public/data/mls-cache.json
          cp data/mls-cache.json public/data/mls-cache-2026.json

      - name: Auto commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update MLS data"
          file_pattern: "public/data/*.json"
          push_options: "--force-with-lease"
