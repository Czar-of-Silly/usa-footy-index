name: Update MLS Data
on:
  schedule:
    # Mornings after MLS match days (UTC). 0,3,4,6 = Sun, Wed, Thu, Sat.
    # MLS plays mostly Sat + Wed; this catches the morning after each.
    - cron: '0 11 * * 0,3,4,6'
  workflow_dispatch:   # manual "Run workflow" button for playoffs / makeups / off-schedule games
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      # Layer 1: MLS official rosters (who's on each team, incl. SEI players)
      - name: Fetch MLS rosters (Layer 1)
        run: node fetch-mls-rosters.js
        timeout-minutes: 10

      # Layer 2a: official MLS (Opta) player stats -> public/data/stats-cache.json.
      # Free, no auth, works from GitHub's datacenter IP. This REPLACED Sofascore;
      # it feeds xG, chances, aerials, clearances, pressures and the GK
      # save-quality data into the grades. Must run BEFORE fetch-data.js, which
      # joins it by sportecId.
      - name: Fetch MLS official stats (Layer 2a)
        run: node fetch-mls-stats.js
        timeout-minutes: 10

      # Layer 2b: merge ESPN (boxscores) + ASA (xG/G+/xPass/dribbling) + the MLS
      # Opta stats above into the player cache. No proxy, no Sofascore. The
      # quality gate blocks the commit if MLS Opta coverage is missing
      # (fresh-or-nothing, never stale).
      - name: Build player cache (Layer 2b)
        run: node fetch-data.js
        timeout-minutes: 20

      # Layer 3: MLSPA salaries (salary-only; DP/U22/Intl come from Layer 1)
      - name: Fetch salaries
        run: node fetch-salary-data.js
        timeout-minutes: 10

      - name: Merge salaries into cache
        run: node merge-salary-and-dp.js
        timeout-minutes: 5

      # Season-tagged copy for the historical loader (2026 == current season).
      - name: Tag current-season copy
        run: cp public/data/mls-cache.json public/data/mls-cache-2026.json

      - name: Auto commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update MLS data (rosters + Opta stats + salaries)"
          file_pattern: "public/data/*.json"
          push_options: "--force-with-lease"
