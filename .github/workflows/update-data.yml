name: Update MLS Data

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout latest
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Fetch fresh 2026 data
        run: node fetch-data.js
        timeout-minutes: 20

      - name: Copy data to public folder
        run: |
          cp data/mls-cache.json public/data/mls-cache.json
          cp data/mls-cache.json public/data/mls-cache-2026.json

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update MLS data $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
