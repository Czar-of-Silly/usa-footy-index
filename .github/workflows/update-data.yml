name: Update MLS Data

on:
  schedule:
    # 2:30am EST = 7:30am UTC
    - cron: '30 7 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest
        run: git pull

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Fetch fresh 2026 data
        run: node fetch-data.js
        timeout-minutes: 20

      - name: Copy data to public folder
        run: |
          cp data/mls-cache.json public/data/mls-cache.json
          cp data/mls-cache.json public/data/mls-cache-2026.json

      - name: Check if data changed
        id: check
        run: |
          if git diff --quiet public/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add public/data/
          git commit -m "Auto-update MLS data $(date +'%Y-%m-%d')"
          git push origin main
