name: Weekly Newsletter

on:
  schedule:
    # Every Tuesday at 10:00 AM EST (15:00 UTC)
    - cron: '0 15 * * 2'
  workflow_dispatch: # Manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      # First run the data fetch to make sure cache is fresh
      - name: Fetch latest data
        run: node fetch-data.js
        timeout-minutes: 20

      # Generate the newsletter
      - name: Generate newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node weekly-newsletter.js

      # Commit the generated newsletter + updated cache
      - name: Commit newsletter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "📰 Weekly newsletter MW$(date +%V) + data update"
          git push
